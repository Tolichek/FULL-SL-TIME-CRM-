<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій софт - Картка клієнта (Історія)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #2d0922 0%, #4b1a30 50%, #c14e1a 100%);
            font-family: 'Ubuntu', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .window {
            width: 800px; /* Трохи ширше для довгих тем зустрічей */
            background: rgba(45, 45, 45, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
        }

        .title-bar {
            background: #3d3d3d;
            padding: 8px 15px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .window-controls { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #555; }
        .dot.close { background: #e95420; }

        .nav-bar {
            display: flex;
            background: #333;
            padding-left: 10px;
        }

        .nav-btn {
            padding: 12px 25px;
            font-size: 13px;
            border: none;
            background: transparent;
            color: #aaa;
            cursor: pointer;
        }

        .nav-btn.active { background: #e95420; color: white; font-weight: bold; }

        .content {
            padding: 20px 30px;
            max-height: 400px;
            overflow-y: auto; /* Якщо історія довга — з'явиться скрол */
        }

        /* Стиль рядка історії */
        .history-item {
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: baseline;
        }

        .history-item:last-child { border-bottom: none; }

        .label { color: #999; margin-right: 6px; font-size: 13px; }
        .value { color: #fff; font-size: 14px; }
        
        /* Акцент на наступній зустрічі */
        .next-meeting {
            color: #ff9d5c; /* Виділяємо колір для "Наступна" */
        }

        .footer {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
        }

        .footer-left { display: flex; gap: 12px; }

        button.btn {
            padding: 8px 20px;
            border-radius: 4px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            background: #4a4a4a;
            color: white;
        }

        button.btn-ok { background: #e95420; }
        button.btn-del { background: #7c1c1c; color: #f8d7da; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <span>Картка клієнта (ms001) / Історія</span>
        <div class="window-controls">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot close"></div>
        </div>
    </div>
    
    <div class="nav-bar">
        <button class="nav-btn">Загальна</button>
        <button class="nav-btn">Поліс</button>
        <button class="nav-btn active">Історія</button>
        <button class="nav-btn">Документи</button>
    </div>

    <div class="content">
        <div class="history-item">
            <div><span class="label">Записано:</span> <span class="value">25.03.2026, 14:30</span></div>
            <div><span class="label">Вид:</span> <span class="value">Дзвінок</span></div>
            <div><span class="label">Наступна:</span> <span class="value next-meeting">28.03.2026</span></div>
            <div style="width: 100%; margin-top: 5px;">
                <span class="label">Тема:</span> <span class="value">Обговорення умов страхування майна, уточнення реквізитів.</span>
            </div>
        </div>

        <div class="history-item">
            <div><span class="label">Записано:</span> <span class="value">20.03.2026, 10:15</span></div>
            <div><span class="label">Вид:</span> <span class="value">В офісі</span></div>
            <div><span class="label">Наступна:</span> <span class="value next-meeting">25.03.2026</span></div>
            <div style="width: 100%; margin-top: 5px;">
                <span class="label">Тема:</span> <span class="value">Перша зустріч, презентація послуг "Мій софт".</span>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-left">
            <button class="btn btn-ok">Ок</button>
            <button class="btn">Записати</button>
        </div>
        <button class="btn btn-del">Видалити</button>
    </div>
</div>

</body>
</html>
