<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tree Contacts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; }
        .safe-area-inset { padding-top: env(safe-area-inset-top); }
        .tree-node { border-left: 1px solid #333; margin-left: 1rem; padding-left: 0.5rem; }
        input, textarea { background: #1e1e1e; border: 1px solid #333; border-radius: 4px; padding: 8px; width: 100%; color: white; }
        .btn { background: #3b82f6; padding: 10px; border-radius: 6px; text-align: center; cursor: pointer; }
        .status-badge { background: #2d2d2d; border: 1px solid #444; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; }
    </style>
</head>
<body class="safe-area-inset">

<div class="flex h-screen flex-col md:flex-row">
    <div id="sidebar" class="w-full md:w-64 border-r border-zinc-800 p-4 overflow-y-auto bg-[#181818]">
        <h2 class="text-sm font-bold uppercase tracking-wider text-zinc-500 mb-4">Структура</h2>
        <div id="tree-container">
            <div class="cursor-pointer hover:text-blue-400 py-1">📂 Всі контакти</div>
            <div class="tree-node">
                <div class="py-1 flex items-center gap-2 text-blue-300">👤 Анатолій <span class="status-badge">Admin</span></div>
                <div class="tree-node">
                    <div class="py-1 opacity-60">👤 Новий контакт...</div>
                </div>
            </div>
        </div>
        <div class="mt-4 btn text-sm">+ Додати гілку</div>
    </div>

    <div class="flex-1 p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex flex-col items-center mb-6">
                <div class="w-24 h-24 bg-zinc-800 rounded-2xl flex items-center justify-center border-2 border-dashed border-zinc-700 mb-2 overflow-hidden">
                    <span class="text-zinc-500">ФОТО</span>
                </div>
                <input type="text" placeholder="ПІБ" class="text-xl font-bold text-center bg-transparent border-none focus:ring-0" value="Надутий Анатолій">
                <input type="text" placeholder="Твій статус" class="text-sm text-center text-blue-400 bg-transparent border-none mt-[-10px]" value="Власник">
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-xs text-zinc-500 block mb-1">Мобільні номери</label>
                    <div id="phone-list" class="space-y-2">
                        <div class="flex gap-2">
                            <input type="tel" placeholder="+380..." value="">
                            <button onclick="this.parentElement.remove()" class="text-red-500 px-2">✕</button>
                        </div>
                    </div>
                    <button onclick="addPhoneField()" class="text-blue-400 text-sm mt-2">+ Додати номер</button>
                </div>

                <div>
                    <label class="text-xs text-zinc-500 block mb-1">Примітка</label>
                    <textarea rows="4" placeholder="Додаткова інформація..."></textarea>
                </div>

                <div class="pt-4">
                    <div class="btn">Зберегти анкету</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function addPhoneField() {
        const container = document.getElementById('phone-list');
        const div = document.createElement('div');
        div.className = 'flex gap-2 animate-fadeIn';
        div.innerHTML = `
            <input type="tel" placeholder="+380..." class="flex-1">
            <button onclick="this.parentElement.remove()" class="text-red-500 px-2">✕</button>
        `;
        container.appendChild(div);
    }
</script>

</body>
</html>
