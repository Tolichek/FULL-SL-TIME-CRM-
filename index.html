<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій софт - Desktop</title>
    <style>
        :root { --u-orange: #e95420; }
        
        body {
            margin: 0; padding: 0; height: 100vh;
            /* ШПАЛЕРИ: Глибока вишнева стіна з текстурою, як на фото */
            background: radial-gradient(circle at center, #6e2b4a 0%, #1a0512 100%);
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAMklEQVRYR2NkYGBgYGFgYPgvC6OnKkYpYpQiRili/KeMUcoYpYhRihilmPFPGaOUMUoRAwCidwP8F9D7nAAAAABJRU5ErkJggg=='); /* Текстура шуму */
            background-blend-mode: overlay;
            font-family: 'Ubuntu', 'Noto Sans UI', sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- ЦЕНТРАЛЬНИЙ ЛОГОТИП (ТЕПЕР СПРАВЖНЄ ГРАФІТІ СВГ) --- */
        .desktop-logo-center {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; pointer-events: none; opacity: 0.8;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
            z-index: 1;
        }

        /* СВГ з діамантом і рваним шрифтом графіті */
        .graffiti-logo-svg { width: 700px; height: auto; }
        .graffiti-fill { fill: var(--u-orange); }

        /* --- ВЕРХНЯ ПАНЕЛЬ --- */
        .top-bar {
            height: 28px; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; font-size: 13px; z-index: 1000;
            position: relative;
        }
        
        .clock { cursor: pointer; font-weight: bold; position: absolute; left: 50%; transform: translateX(-50%); }
        .menu-btn-top { cursor: pointer; font-weight: bold; padding: 0 10px; }
        .menu-btn-top:hover { background: rgba(255,255,255,0.1); }

        /* --- ЛАУНЧЕР --- */
        .launcher {
            position: fixed; left: 0; top: 28px; bottom: 0; width: 55px;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center; padding-top: 10px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 900;
        }

        .l-icon {
            width: 42px; height: 42px; margin-bottom: 12px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 24px;
            border-radius: 6px; transition: 0.2s;
        }
        .l-icon:hover { background: rgba(255, 255, 255, 0.1); }
        .l-icon.active { border-left: 3px solid var(--u-orange); background: rgba(255,255,255,0.1); border-radius: 0 6px 6px 0; }

        /* --- ВІКНА --- */
        .win {
            position: absolute; background: rgba(45, 45, 45, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            display: none; flex-direction: column; overflow: hidden; z-index: 800;
        }

        .win-head { height: 35px; background: #3d3d3d; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-radius: 8px 8px 0 0; }
        .win-title { font-size: 14px; font-weight: bold; }
        .close-dot { width: 12px; height: 12px; background: var(--u-orange); border-radius: 50%; cursor: pointer; }

        /* ВЕЛИКИЙ ЦЕНТРОВАНИЙ КАЛЕНДАР */
        .win-cal-pop {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 700px; height: 550px; background: #2d2d2d; z-index: 2000;
        }

        /* --- МЕНЮ --- */
        .menu-pop { position: absolute; top: 30px; right: 10px; width: 220px; background: #2d2d2d; border: 1px solid #444; border-radius: 6px; display: none; flex-direction: column; z-index: 1001; }
        .m-item { padding: 12px 15px; cursor: pointer; font-size: 14px; }
        .m-item:hover { background: var(--u-orange); }

    </style>
</head>
<body>

    <div class="top-bar">
        <div>Мій софт</div>
        <div class="clock" onclick="toggleWin('calendar')">Срд 15 Трв, 10:30</div>
        <div class="menu-btn-top" onclick="toggleWin('menu')">Меню</div>
    </div>

    <div class="launcher">
        <div class="l-icon" onclick="openNote()">📑</div> <div class="l-icon">🌱</div> <div class="l-icon">☂️</div> <div class="l-icon">👥</div> <div class="l-icon">👤</div> <div style="margin-top: auto; margin-bottom: 20px;">
            <div class="l-icon">⚙️</div> <div class="l-icon">:::</div> </div>
    </div>

    <div class="desktop-logo-center">
        <svg class="graffiti-logo-svg" viewBox="0 0 600 200">
            <path class="graffiti-fill" d="M12 170 C2 165, 5 150, 15 145 M15 145 C25 140, 30 148, 25 155 M25 155 L15 165 C5 175, 12 185, 22 180" stroke="#e95420" stroke-width="2"/> <path class="graffiti-fill" d="M45 145 C55 140, 60 148, 55 155 M55 155 L45 165" stroke="#e95420" stroke-width="2"/> <path class="graffiti-fill" d="M70 145 C80 140, 85 148, 80 155 M80 155 L70 165" stroke="#e95420" stroke-width="2"/> <path class="graffiti-fill" d="M110 145 L130 140 L135 155 L115 160 Z" stroke="#e95420" stroke-width="2"/> <path class="graffiti-fill" d="M150 145 L170 140 L175 155 L155 160 Z" stroke="#e95420" stroke-width="2"/> <path class="graffiti-fill" d="M190 145 L210 140 L215 155 L195 160 L190 145" stroke="#e95420" stroke-width="2"/> <path class="graffiti-fill" d="M230 140 L250 135 L245 160 Z" stroke="#e95420" stroke-width="2"/> <path d="M140 30 L180 30 L200 60 L140 100 L80 60 Z" fill="none" stroke="#e95420" stroke-width="4"/>
            <path d="M140 30 L160 60 L140 100" fill="none" stroke="#e95420" stroke-width="2"/>
            <path d="M180 30 L160 60 L140 100" fill="none" stroke="#e95420" stroke-width="2"/>
        </svg>
    </div>

    <div id="calendar" class="win win-cal-pop">
        <div class="win-head">
            <span class="win-title">Календар Травень 2026</span>
            <div class="close-dot" onclick="toggleWin('calendar')"></div>
        </div>
        <div style="padding: 50px; text-align: center; font-size: 24px;">ВЕЛИКИЙ КАЛЕНДАР ПО ЦЕНТРУ</div>
    </div>

    <div id="menu" class="menu-pop">
        <div class="m-item">Налаштування акаунту</div>
        <div class="m-item">Налаштування</div>
        <div style="height: 1px; background: #444;"></div>
        <div class="m-item">Вихід</div>
    </div>

<script>
    function toggleWin(id) {
        let el = document.getElementById(id);
        el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
    }
    
    // Закриття меню при кліку поза ним
    window.onclick = function(e) {
        if (!e.target.matches('.menu-btn-top')) document.getElementById('menu').style.display = 'none';
    }
</script>
</body>
</html>
