<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HumanTree Graphit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --bg: #121212; 
            --card: #1e1e1e; 
            --accent: #3b82f6; 
            --text: #e0e0e0; 
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding-top: env(safe-area-inset-top); }
        
        /* Кольорові рівні зв'язків */
        .level-0 { border-left: 2px solid #3b82f6; } /* Синій */
        .level-1 { border-left: 2px solid #10b981; } /* Зелений */
        .level-2 { border-left: 2px solid #ef4444; } /* Червоний */
        .level-3 { border-left: 2px solid #f59e0b; } /* Жовтий */

        .node-container { margin-left: 12px; padding-left: 14px; position: relative; }
        .node-row { display: flex; align-items: center; padding: 10px 0; position: relative; }
        .node-row::before { content: ''; position: absolute; left: -14px; top: 50%; width: 14px; height: 1px; background: currentColor; opacity: 0.3; }

        .full-page { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; }
        .input-group { background: var(--card); border-radius: 12px; overflow: hidden; margin-bottom: 16px; border: 1px solid #2a2a2a; }
        .field { padding: 12px 16px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; }
        .field:last-child { border-bottom: none; }
        .field label { width: 110px; font-size: 13px; color: #888; }
        .field input, .field textarea { background: transparent; border: none; outline: none; color: #fff; flex: 1; font-size: 16px; }
    </style>
</head>
<body>

    <div id="main-screen" class="p-4">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold tracking-tight">Картотека</h1>
            <button onclick="addNewNode(null)" class="text-blue-500 text-3xl">+</button>
        </div>
        <div id="tree-root"></div>
    </div>

    <div id="editor" class="full-page overflow-y-auto">
        <div class="flex justify-between items-center px-4 py-4 border-b border-[#2a2a2a] sticky top-0 bg-[#121212] z-10">
            <button onclick="closeEditor()" class="text-blue-500">Скасувати</button>
            <span class="font-semibold">Анкета</span>
            <button onclick="saveNode()" class="text-blue-500 font-bold">Готово</button>
        </div>

        <div class="p-4 pt-6">
            <div class="flex flex-col items-center mb-8">
                <div class="relative">
                    <input type="file" id="photo-input" hidden accept="image/*" onchange="previewPhoto(this)">
                    <div id="photo-preview" onclick="document.getElementById('photo-input').click()" class="w-24 h-24 bg-[#252525] rounded-full flex items-center justify-center border-2 border-dashed border-[#333] overflow-hidden">
                        <span class="text-[10px] text-zinc-600">ФОТО</span>
                    </div>
                    <div class="absolute bottom-0 right-0 bg-blue-600 w-7 h-7 rounded-full flex items-center justify-center text-[10px] border-2 border-[#121212]">✎</div>
                </div>
            </div>

            <div class="input-group">
                <div class="field">
                    <label>Статус</label>
                    <input id="edit-status" type="text" placeholder="Напр. Клієнт" class="text-blue-400 font-medium">
                </div>
                <div class="field">
                    <label>Прізвище</label>
                    <input id="edit-surname" type="text" placeholder="Прізвище">
                </div>
                <div class="field">
                    <label>Ім'я</label>
                    <input id="edit-name" type="text" placeholder="Ім'я">
                </div>
            </div>

            <div class="input-group" id="phone-container">
                </div>
            <button onclick="addPhoneField('')" class="text-blue-500 text-sm mb-6 ml-2">+ Додати номер</button>

            <div class="input-group">
                <div class="field">
                    <label>E-mail</label>
                    <input id="edit-email" type="email" placeholder="example@mail.com">
                </div>
                <div class="field">
                    <label>Народився</label>
                    <input id="edit-bday" type="date" class="text-white">
                </div>
            </div>

            <div class="input-group">
                <div class="field">
                    <textarea id="edit-note" placeholder="Додаткова інформація..." class="min-h-[100px]"></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        let treeData = JSON.parse(localStorage.getItem('treeData')) || [];
        let currentId = null;
        let currentPhotoBase64 = '';

        const colors = ['level-0', 'level-1', 'level-2', 'level-3'];

        function render() {
            const root = document.getElementById('tree-root');
            root.innerHTML = '';
            buildTree(null, root, 0);
        }

        function buildTree(parentId, container, level) {
            const children = treeData.filter(n => n.parentId === parentId);
            if (children.length === 0) return;

            const wrap = document.createElement('div');
            wrap.className = parentId ? `node-container ${colors[level % 4]}` : '';
            container.appendChild(wrap);

            children.forEach(node => {
                const row = document.createElement('div');
                row.className = 'node-row';
                row.innerHTML = `
                    <div class="flex-1" onclick="openNode('${node.id}')">
                        <div class="text-xs text-blue-400 mb-[-2px]">${node.status || ''}</div>
                        <div class="font-medium text-lg">${node.surname || ''} ${node.name || 'Новий'}</div>
                    </div>
                    <button onclick="addNewNode('${node.id}')" class="text-zinc-700 px-4 text-2xl font-light">+</button>
                `;
                wrap.appendChild(row);
                buildTree(node.id, wrap, level + 1);
            });
        }

        function previewPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('photo-preview').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                    currentPhotoBase64 = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function addNewNode(parentId) {
            const id = 'id' + Date.now();
            treeData.push({ id, parentId, name:'', surname:'', status:'', phones:[''], email:'', bday:'', note:'', photo:'' });
            openNode(id);
        }

        function openNode(id) {
            currentId = id;
            const node = treeData.find(n => n.id === id);
            document.getElementById('edit-status').value = node.status || '';
            document.getElementById('edit-surname').value = node.surname || '';
            document.getElementById('edit-name').value = node.name || '';
            document.getElementById('edit-email').value = node.email || '';
            document.getElementById('edit-bday').value = node.bday || '';
            document.getElementById('edit-note').value = node.note || '';
            currentPhotoBase64 = node.photo || '';
            
            document.getElementById('photo-preview').innerHTML = currentPhotoBase64 ? 
                `<img src="${currentPhotoBase64}" class="w-full h-full object-cover">` : 
                `<span class="text-[10px] text-zinc-600">ФОТО</span>`;

            const pCont = document.getElementById('phone-container');
            pCont.innerHTML = '';
            (node.phones || ['']).forEach(p => addPhoneField(p));
            
            document.getElementById('editor').style.display = 'flex';
        }

        function addPhoneField(val) {
            const div = document.createElement('div');
            div.className = 'field';
            div.innerHTML = `<label>Мобільний</label><input type="tel" value="${val}" placeholder="+380...">`;
            document.getElementById('phone-container').appendChild(div);
        }

        function saveNode() {
            const node = treeData.find(n => n.id === currentId);
            node.status = document.getElementById('edit-status').value;
            node.surname = document.getElementById('edit-surname').value;
            node.name = document.getElementById('edit-name').value;
            node.email = document.getElementById('edit-email').value;
            node.bday = document.getElementById('edit-bday').value;
            node.note = document.getElementById('edit-note').value;
            node.photo = currentPhotoBase64;
            node.phones = Array.from(document.querySelectorAll('#phone-container input')).map(i => i.value);
            
            localStorage.setItem('treeData', JSON.stringify(treeData));
            closeEditor();
            render();
        }

        function closeEditor() { document.getElementById('editor').style.display = 'none'; }

        render();
    </script>
</body>
</html>
