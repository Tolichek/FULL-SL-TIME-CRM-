<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HumanTree Full Restore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0f0f0f; --card: #1c1c1d; --border: #2c2c2e; --accent: #10b981; --blue: #3498db; --chat-bg: #262628; }
        body { background: var(--bg); color: #efeff4; font-family: sans-serif; margin: 0; padding: env(safe-area-inset-top) 0 0 0; overflow: hidden; height: 100vh; }
        .header-fix { position: sticky; top: 0; background: rgba(15,15,15,0.9); backdrop-filter: blur(10px); z-index: 110; display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .full-page { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; padding-top: env(safe-area-inset-top); }
        
        /* Tree */
        .node-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #1a1a1a; background: rgba(255,255,255,0.02); }
        .level-0 { border-left: 3px solid var(--blue); }
        .level-1 { border-left: 3px solid var(--accent); margin-left: 12px; }
        .level-2 { border-left: 3px solid #ef4444; margin-left: 20px; }
        .level-3 { border-left: 3px solid #f59e0b; margin-left: 28px; }

        /* Chat Styles (Telegram) */
        #history-content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: #000; }
        .date-separator { align-self: center; color: var(--accent); font-size: 11px; padding: 4px 12px; margin: 15px 0; font-weight: bold; text-transform: uppercase; }
        .chat-bubble { align-self: flex-start; background: var(--chat-bg); padding: 8px 12px 6px 12px; border-radius: 14px 14px 14px 4px; max-width: 85%; position: relative; margin-bottom: 6px; min-width: 80px; }
        .chat-text { font-size: 15px; line-height: 1.4; color: #fff; margin-bottom: 2px; display: block; }
        .chat-time { font-size: 10px; color: var(--accent); text-align: right; display: block; font-weight: bold; }
        .history-footer { padding: 10px; background: #1c1c1d; display: flex; align-items: flex-end; gap: 10px; border-top: 1px solid var(--border); }
        #history-input { background: #000; border: 1px solid #333; border-radius: 20px; padding: 8px 16px; color: #fff; flex: 1; max-height: 120px; font-size: 16px; outline: none; }

        /* Form Styles */
        .input-group { background: var(--card); border-radius: 10px; margin-bottom: 16px; border: 1px solid var(--border); overflow: hidden; }
        .field { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
        .field label { font-size: 10px; color: var(--accent); width: 85px; text-transform: uppercase; font-weight: bold; flex-shrink: 0; }
        .field input, .field select { background: transparent; border: none; outline: none; color: #fff; flex: 1; font-size: 16px; width: 100%; }
        
        /* Note Bubbles */
        .note-bubble-wrap { background: var(--chat-bg); border-radius: 12px; padding: 10px; margin-bottom: 12px; position: relative; border-left: 3px solid var(--blue); }
        .note-bubble-date { font-size: 10px; color: var(--accent); position: absolute; top: 6px; right: 10px; font-weight: bold; }
        textarea.note-area { width: 100%; background: transparent; border: none; outline: none; color: #fff; font-size: 15px; min-height: 45px; padding-top: 12px; resize: none; }

        .btn-plus { color: var(--blue); font-size: 14px; padding: 8px 16px; display: block; }
        .age-badge { font-size: 12px; color: var(--accent); margin-left: auto; font-weight: bold; }
        .photo-wrap { position: relative; width: 100px; height: 100px; margin: 10px auto 20px; }
    </style>
</head>
<body>

    <div id="main-screen" class="h-full overflow-y-auto">
        <div class="header-fix"><span class="text-accent font-bold text-xs uppercase">Список / Структура</span><button onclick="addNewNode(null)" class="text-blue-500 text-3xl">+</button></div>
        <div id="tree-root"></div>
    </div>

    <div id="editor" class="full-page overflow-y-auto">
        <div class="header-fix">
            <button onclick="closeEditor()" class="text-blue-500 text-sm">Скасувати</button>
            <button onclick="saveNode()" class="text-blue-500 font-bold text-lg">Готово</button>
        </div>
        <div class="p-4 pb-32">
            <div class="photo-wrap">
                <input type="file" id="photo-input" hidden accept="image/*" onchange="previewPhoto(this)">
                <div onclick="document.getElementById('photo-input').click()" class="w-24 h-24 bg-[#252525] rounded-full flex items-center justify-center border border-[#333] overflow-hidden mx-auto">
                    <img id="edit-photo-preview" src="" class="w-full h-full object-cover" style="display:none">
                    <span id="photo-placeholder" class="text-[10px] text-zinc-600">ФОТО</span>
                </div>
            </div>

            <div class="input-group">
                <div class="field"><label>Статус</label><input id="edit-status" type="text" style="color:var(--accent); font-weight:bold;"></div>
                <div class="field"><label>Прізвище</label><input id="edit-surname" type="text"></div>
                <div class="field"><label>Ім'я</label><input id="edit-name" type="text"></div>
                <div id="patr-cont"></div>
            </div>
            <button id="btn-patr" onclick="addPatrField('')" class="btn-plus">+ Додати по-батькові</button>

            <div id="phone-container"></div>
            <button onclick="addPhoneField('')" class="btn-plus">+ Додати номер</button>

            <div class="input-group">
                <div class="field"><label>Дата нар.</label><input id="edit-bday" type="date" onchange="updateAge(this, 'age-badge-main')"><span id="age-badge-main" class="age-badge"></span></div>
                <div class="field"><label>Паспорт</label><input id="edit-pass-ser" placeholder="Серія" style="width:50px; flex:none;"><input id="edit-pass-num" placeholder="Номер"></div>
                <div class="field"><label>ІНН</label><input id="edit-inn" type="text"></div>
            </div>

            <div class="input-group">
                <div class="field"><label>Область</label><input id="edit-region" type="text"></div>
                <div class="field"><label>Місто</label><input id="edit-city" type="text"></div>
                <div class="field"><label>Вулиця</label><input id="edit-street" type="text"></div>
                <div class="field"><label>Будинок</label><input id="edit-house" type="text"></div>
                <div id="extra-addr"></div>
            </div>
            <div class="flex gap-4"><button onclick="addExtra('corp')" class="btn-plus">+ Корпус</button><button onclick="addExtra('apt')" class="btn-plus">+ Квартира</button><button onclick="addExtra('zip')" class="btn-plus">+ Індекс</button></div>

            <button onclick="openHistory()" class="w-full py-4 bg-zinc-800 rounded-xl text-white font-bold mt-6 uppercase">Історія (Чат)</button>
            <button onclick="openInsurance(0)" class="w-full py-4 bg-zinc-800 rounded-xl text-white font-bold mt-2 uppercase">Поліс</button>
        </div>
    </div>

    <div id="ins-editor" class="full-page overflow-y-auto">
        <div class="header-fix"><button onclick="closeInsurance()" class="text-blue-500">Назад</button><div class="text-white font-bold">Поліс</div><div class="w-10"></div></div>
        <div class="p-4 pb-32">
            <div id="ins-fields-root"></div>
            <div id="ins-notes-cont"></div>
            <button onclick="addInsNote('', '${new Date().toLocaleString('uk-UA')}')" class="btn-plus">+ Додати примітку</button>
        </div>
    </div>

    <div id="history-screen" class="full-page">
        <div class="header-fix"><button onclick="closeHistory()" class="text-blue-500">Назад</button><div class="text-white font-bold">Історія</div><div class="w-10"></div></div>
        <div id="history-content"></div>
        <div class="history-footer"><textarea id="history-input" rows="1" oninput="this.style.height='';this.style.height=this.scrollHeight+'px'"></textarea><button onclick="addHistoryMsg()" class="text-blue-500 text-3xl">➤</button></div>
    </div>

    <script>
        let treeData = JSON.parse(localStorage.getItem('treeData')) || [];
        let currentId = null, currentPhoto = '', activeInsIdx = 0;

        function render() {
            const root = document.getElementById('tree-root'); root.innerHTML = '';
            treeData.filter(n => !n.parentId).forEach(node => buildTree(node, root, 0));
        }

        function buildTree(node, container, level) {
            const wrap = document.createElement('div'); wrap.className = `level-${level % 4}`;
            container.appendChild(wrap);
            wrap.innerHTML = `<div class="node-row" onclick="openNode('${node.id}')"><div class="flex-1"><div class="text-[10px] text-accent font-bold uppercase">${node.status || ''}</div><div class="text-lg">${node.surname || ''} ${node.name || '...'}</div></div><button onclick="event.stopPropagation(); addNewNode('${node.id}')" class="text-blue-500 text-2xl px-2">+</button></div>`;
            treeData.filter(n => n.parentId === node.id).forEach(child => buildTree(child, wrap, level + 1));
        }

        function openNode(id) {
            currentId = id; const n = treeData.find(x => x.id === id);
            document.getElementById('edit-status').value = n.status || '';
            document.getElementById('edit-surname').value = n.surname || '';
            document.getElementById('edit-name').value = n.name || '';
            currentPhoto = n.photo || '';
            const img = document.getElementById('edit-photo-preview');
            if(currentPhoto) { img.src = currentPhoto; img.style.display = 'block'; document.getElementById('photo-placeholder').style.display = 'none'; }
            else { img.style.display = 'none'; document.getElementById('photo-placeholder').style.display = 'block'; }
            
            document.getElementById('patr-cont').innerHTML = '';
            if(n.patronymic) addPatrField(n.patronymic); else document.getElementById('btn-patr').style.display = 'block';
            
            document.getElementById('edit-bday').value = n.bday || '';
            updateAge({value: n.bday}, 'age-badge-main');
            document.getElementById('edit-pass-ser').value = n.pass_ser || '';
            document.getElementById('edit-pass-num').value = n.pass_num || '';
            document.getElementById('edit-inn').value = n.inn || '';
            document.getElementById('edit-region').value = n.region || '';
            document.getElementById('edit-city').value = n.city || '';
            document.getElementById('edit-street').value = n.street || '';
            document.getElementById('edit-house').value = n.house || '';
            
            document.getElementById('extra-addr').innerHTML = '';
            ['corp', 'apt', 'zip'].forEach(t => { if(n[t]) addExtra(t, n[t]); });
            
            document.getElementById('phone-container').innerHTML = ''; (n.phones || []).forEach(p => addPhoneField(p));
            document.getElementById('editor').style.display = 'flex';
        }

        function saveNode() {
            const n = treeData.find(x => x.id === currentId);
            if(n) {
                n.status = document.getElementById('edit-status').value;
                n.surname = document.getElementById('edit-surname').value;
                n.name = document.getElementById('edit-name').value;
                n.photo = currentPhoto;
                n.patronymic = document.getElementById('inp-patr')?.value || '';
                n.bday = document.getElementById('edit-bday').value;
                n.pass_ser = document.getElementById('edit-pass-ser').value;
                n.pass_num = document.getElementById('edit-pass-num').value;
                n.inn = document.getElementById('edit-inn').value;
                n.region = document.getElementById('edit-region').value;
                n.city = document.getElementById('edit-city').value;
                n.street = document.getElementById('edit-street').value;
                n.house = document.getElementById('edit-house').value;
                n.corp = document.getElementById('edit-corp')?.value || '';
                n.apt = document.getElementById('edit-apt')?.value || '';
                n.zip = document.getElementById('edit-zip')?.value || '';
                n.phones = Array.from(document.querySelectorAll('.phone-data')).map(i => i.value).filter(v => v.trim());
                localStorage.setItem('treeData', JSON.stringify(treeData));
                closeEditor(); render();
            }
        }

        function openInsurance(idx) {
            activeInsIdx = idx; const n = treeData.find(x => x.id === currentId); if(!n.insurances) n.insurances = [{}];
            const ins = n.insurances[idx];
            document.getElementById('ins-fields-root').innerHTML = `
                <div class="input-group">
                    <div class="field"><label>Прізвище</label><input id="ins-sur" value="${ins.surname||''}"></div>
                    <div class="field"><label>Ім'я</label><input id="ins-nam" value="${ins.name||''}"></div>
                    <div class="field"><label>По-батькові</label><input id="ins-pat" value="${ins.patronymic||''}"></div>
                </div>
                <div class="input-group">
                    <div class="field"><label>Дата нар.</label><input id="ins-bday" type="date" value="${ins.bday||''}" onchange="updateAge(this, 'ia')"><span id="ia" class="age-badge">${calculateAge(ins.bday)}</span></div>
                    <div class="field"><label>Стать</label><select id="ins-gen">
                        <option value="жінка" ${ins.gender==='жінка'?'selected':''}>жінка</option>
                        <option value="чоловік" ${ins.gender==='чоловік'?'selected':''}>чоловік</option>
                        <option value="дівчинка" ${ins.gender==='дівчинка'?'selected':''}>дівчинка</option>
                        <option value="хлопчик" ${ins.gender==='хлопчик'?'selected':''}>хлопчик</option>
                    </select></div>
                </div>
                <div class="input-group">
                    <div class="field"><label>Строк</label><select id="ins-term">${['на 10 років','на 15 років','на 16 років','на 17 років','на 18 років','на 19 років','на 20 років','на 25 років','до 50 років','до 55 років','до 60 років','до 65 років'].map(v=>`<option value="${v}" ${ins.term===v?'selected':''}>${v}</option>`).join('')}</select></div>
                    <div class="field"><label>Сума полісу</label><input id="ins-tot" value="${ins.total||''}"></div>
                    <div class="field"><label>№ Накоп.</label><input id="ins-nn" value="${ins.n_nakop||''}"></div>
                    <div class="field"><label>Сума Накоп.</label><input id="ins-sn" value="${ins.s_nakop||''}"></div>
                    <div class="field"><label>№ Захисту</label><input id="ins-nz" value="${ins.n_zahyst||''}"></div>
                    <div class="field"><label>Сума Захисту</label><input id="ins-sz" value="${ins.s_zahyst||''}"></div>
                </div>
                <div class="input-group">
                    <div class="field"><label>Роль</label><select id="ins-role"><option value="Батько" ${ins.role==='Батько'?'selected':''}>Батько</option><option value="Мати" ${ins.role==='Мати'?'selected':''}>Мати</option></select></div>
                    <div class="field"><label>Прізвище</label><input id="ins-psur" value="${ins.p_sur||''}"></div>
                    <div class="field"><label>Ім'я</label><input id="ins-pnam" value="${ins.p_nam||''}"></div>
                    <div class="field"><label>Дата нар.</label><input id="ins-pbday" type="date" value="${ins.p_bday||''}" onchange="updateAge(this, 'ipa')"><span id="ipa" class="age-badge">${calculateAge(ins.p_bday)}</span></div>
                </div>
            `;
            document.getElementById('ins-notes-cont').innerHTML = '';
            (ins.notes || []).forEach(nt => addInsNote(nt.text, nt.date));
            document.getElementById('ins-editor').style.display = 'flex';
        }

        function closeInsurance() {
            const n = treeData.find(x => x.id === currentId), ins = n.insurances[activeInsIdx];
            ins.surname = document.getElementById('ins-sur').value; ins.name = document.getElementById('ins-nam').value;
            ins.patronymic = document.getElementById('ins-pat').value; ins.bday = document.getElementById('ins-bday').value;
            ins.gender = document.getElementById('ins-gen').value; ins.term = document.getElementById('ins-term').value;
            ins.total = document.getElementById('ins-tot').value; ins.n_nakop = document.getElementById('ins-nn').value;
            ins.s_nakop = document.getElementById('ins-sn').value; ins.n_zahyst = document.getElementById('ins-nz').value;
            ins.s_zahyst = document.getElementById('ins-sz').value; ins.role = document.getElementById('ins-role').value;
            ins.p_sur = document.getElementById('ins-psur').value; ins.p_nam = document.getElementById('ins-pnam').value;
            ins.p_bday = document.getElementById('ins-pbday').value;
            ins.notes = Array.from(document.querySelectorAll('.note-bubble-wrap')).map(w => ({
                text: w.querySelector('textarea').value,
                date: w.querySelector('.note-bubble-date').innerText
            })).filter(v => v.text.trim() !== "");
            document.getElementById('ins-editor').style.display = 'none';
        }

        function renderHistory() {
            const cont = document.getElementById('history-content'); cont.innerHTML = '';
            const n = treeData.find(x => x.id === currentId);
            let lastDate = "";
            (n.history || []).forEach(msg => {
                const msgDate = new Date(msg.time).toLocaleDateString('uk-UA');
                if(msgDate !== lastDate) { cont.innerHTML += `<div class="date-separator">${msgDate}</div>`; lastDate = msgDate; }
                const time = new Date(msg.time).toLocaleTimeString('uk-UA', {hour:'2-digit', minute:'2-digit'});
                cont.innerHTML += `<div class="chat-bubble"><span class="chat-text">${msg.text}</span><span class="chat-time">${time}</span></div>`;
            });
            cont.scrollTop = cont.scrollHeight;
        }

        function addHistoryMsg() {
            const input = document.getElementById('history-input'); if(!input.value.trim()) return;
            const n = treeData.find(x => x.id === currentId); if(!n.history) n.history = [];
            n.history.push({ text: input.value, time: new Date().toISOString() });
            input.value = ''; input.style.height = ''; renderHistory();
        }

        function previewPhoto(input) { if (input.files && input.files[0]) { const reader = new FileReader(); reader.onload = e => { currentPhoto = e.target.result; document.getElementById('edit-photo-preview').src = currentPhoto; document.getElementById('edit-photo-preview').style.display = 'block'; document.getElementById('photo-placeholder').style.display = 'none'; }; reader.readAsDataURL(input.files[0]); } }
        function addPhoneField(v) { const div = document.createElement('div'); div.className = 'input-group'; div.innerHTML = `<div class="field"><label>Моб.</label><input type="tel" class="phone-data" value="${v}"></div>`; document.getElementById('phone-container').appendChild(div); }
        function addInsNote(text, date) { const wrap = document.createElement('div'); wrap.className = 'note-bubble-wrap'; wrap.innerHTML = `<span class="note-bubble-date">${date}</span><textarea class="note-area" oninput="this.style.height='';this.style.height=this.scrollHeight+'px'">${text||''}</textarea>`; document.getElementById('ins-notes-cont').appendChild(wrap); const ta = wrap.querySelector('textarea'); ta.style.height = ta.scrollHeight + 'px'; }
        function addPatrField(v) { document.getElementById('patr-cont').innerHTML = `<div class="field"><label>По-батькові</label><input id="inp-patr" type="text" value="${v}"></div>`; document.getElementById('btn-patr').style.display = 'none'; }
        function addExtra(t, v='') { const labels = {corp:'Корпус', apt:'Квартира', zip:'Індекс'}; const div = document.createElement('div'); div.className = 'field'; div.innerHTML = `<label>${labels[t]}</label><input id="edit-${t}" type="text" value="${v}">`; document.getElementById('extra-addr').appendChild(div); }
        function calculateAge(d) { if(!d) return ''; const b = new Date(d), t = new Date(); let a = t.getFullYear()-b.getFullYear(); if(t.getMonth()<b.getMonth() || (t.getMonth()===b.getMonth() && t.getDate()<b.getDate())) a--; return a + ' р.'; }
        function updateAge(el, id) { document.getElementById(id).innerText = calculateAge(el.value); }
        function addNewNode(pId) { const id = 'id' + Date.now(); treeData.push({ id, parentId: pId, surname: '', name: '', status: 'Новий', phones: [], history: [], insurances: [{notes:[]}] }); localStorage.setItem('treeData', JSON.stringify(treeData)); render(); openNode(id); }
        function closeEditor() { document.getElementById('editor').style.display = 'none'; }
        function openHistory() { document.getElementById('history-screen').style.display = 'flex'; renderHistory(); }
        function closeHistory() { document.getElementById('history-screen').style.display = 'none'; }
        render();
    </script>
</body>
</html>
