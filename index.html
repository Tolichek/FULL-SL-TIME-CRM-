<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SL NEURAL CORE</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #030303;
            --accent: #fff;
            --node: #1a1a1a;
            --line: rgba(255,255,255,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--accent); overflow: hidden; height: 100vh; }

        /* Canvas Background */
        #canvas {
            width: 3000px; height: 3000px;
            background-image: radial-gradient(var(--line) 1px, transparent 1px);
            background-size: 40px 40px;
            position: absolute; top: -1000px; left: -1000px;
            transition: transform 0.1s ease-out;
        }

        /* UI Overlay */
        #ui-top { position: fixed; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
        .glass-tag { background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 40px; backdrop-filter: blur(10px); border: 1px solid var(--line); pointer-events: auto; }

        /* Neural Node */
        .node {
            position: absolute;
            width: 160px; min-height: 80px;
            background: var(--node);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 15px;
            cursor: move;
            transition: box-shadow 0.3s;
            display: flex; flex-direction: column; justify-content: center;
        }
        .node:active { box-shadow: 0 0 30px rgba(255,255,255,0.2); }
        .node input { background: transparent; border: none; color: #fff; font-size: 14px; font-weight: 700; width: 100%; outline: none; }
        .node span { font-size: 10px; opacity: 0.4; text-transform: uppercase; margin-top: 5px; }

        /* Navigation Circle */
        #nav-ring {
            position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%);
            width: 300px; height: 150px; background: #fff; border-radius: 150px 150px 0 0;
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .btn-main { width: 60px; height: 60px; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui-top">
    <div class="glass-tag">SYSTEM: ACTIVE</div>
    <div class="glass-tag" id="counter">0 NODES</div>
</div>

<div id="canvas">
    </div>

<div id="nav-ring">
    <div class="btn-main" onclick="addNode()">+</div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBLi2NoAigr1CDQm98iZHUZXNeDzJMwwxY", authDomain: "starlife-crm.firebaseapp.com", projectId: "starlife-crm", storageBucket: "starlife-crm.firebasestorage.app", messagingSenderId: "1022280682130", appId: "1:1022280682130:web:3ea517e8b6d22c7787744b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore(), auth = firebase.auth();
    let user = null, nodes = [];

    auth.onAuthStateChanged(u => {
        if(u) { user = u; loadNodes(); }
        else { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    });

    function loadNodes() {
        db.collection("users").doc(user.uid).collection("clients").onSnapshot(s => {
            const container = document.getElementById('canvas');
            container.innerHTML = '';
            let i = 0;
            s.forEach(doc => {
                const data = doc.data();
                createNodeUI(doc.id, data, i++);
            });
            document.getElementById('counter').innerText = s.size + ' NODES';
        });
    }

    function createNodeUI(id, data, index) {
        const div = document.createElement('div');
        div.className = 'node';
        // Випадкове або розраховане положення
        const x = data.posX || (1500 + Math.cos(index) * 300);
        const y = data.posY || (1500 + Math.sin(index) * 300);
        div.style.left = x + 'px';
        div.style.top = y + 'px';

        div.innerHTML = `
            <input value="${data.lname || 'Новий'}" onchange="updateNode('${id}', 'lname', this.value)">
            <span>Level: ${data.level || '0'}</span>
        `;
        
        // Drag logic
        let isDragging = false;
        div.onmousedown = (e) => { isDragging = true; };
        window.onmousemove = (e) => {
            if(isDragging) {
                const newX = e.clientX + window.scrollX + 800; // offset
                const newY = e.clientY + window.scrollY + 800;
                div.style.left = newX + 'px';
                div.style.top = newY + 'px';
            }
        };
        window.onmouseup = () => { 
            if(isDragging) {
                updatePos(id, parseInt(div.style.left), parseInt(div.style.top));
                isDragging = false; 
            }
        };

        document.getElementById('canvas').appendChild(div);
    }

    async function addNode() {
        await db.collection("users").doc(user.uid).collection("clients").add({
            lname: 'Новий контакт',
            step: 0,
            posX: 1500,
            posY: 1500
        });
    }

    async function updateNode(id, field, val) {
        await db.collection("users").doc(user.uid).collection("clients").doc(id).update({ [field]: val });
    }

    async function updatePos(id, x, y) {
        await db.collection("users").doc(user.uid).collection("clients").doc(id).update({ posX: x, posY: y });
    }

    // Zoom & Pan (Simplified)
    let zoom = 1;
    window.onwheel = (e) => {
        zoom -= e.deltaY * 0.001;
        document.getElementById('canvas').style.transform = `scale(${zoom})`;
    };
</script>

</body>
</html>
