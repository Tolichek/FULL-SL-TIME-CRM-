<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій софт - Desktop</title>
    <style>
        :root { --u-orange: #e95420; }
        
        body {
            margin: 0; padding: 0; height: 100vh;
            /* ФОН: Темна стіна з твого макета */
            background: radial-gradient(circle, rgba(75,26,48,1) 0%, rgba(26,5,18,1) 100%);
            font-family: 'Ubuntu', sans-serif; color: white; overflow: hidden;
        }

        /* ЛОГОТИП ПО ЦЕНТРУ ЯК НА СКРИНІ */
        .main-logo {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; pointer-events: none;
        }
        .logo-text { 
            font-size: 80px; color: var(--u-orange); font-weight: bold; 
            line-height: 0.8; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .diamond { font-size: 60px; color: var(--u-orange); margin-bottom: 10px; }

        /* ВЕРХНЯ ПАНЕЛЬ */
        .top-bar {
            height: 28px; background: rgba(0, 0, 0, 0.8);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; font-size: 13px; z-index: 1000;
        }
        .clock { cursor: pointer; font-weight: bold; position: absolute; left: 50%; transform: translateX(-50%); }
        .menu-btn { cursor: pointer; font-weight: bold; }

        /* ЛАУНЧЕР З ТВОЇМИ ІКОНКАМИ */
        .launcher {
            position: fixed; left: 0; top: 28px; bottom: 0; width: 55px;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center; padding-top: 10px;
        }
        .icon { width: 40px; height: 40px; margin-bottom: 15px; cursor: pointer; font-size: 24px; display: flex; justify-content: center; align-items: center; border-radius: 6px; transition: 0.2s; }
        .icon:hover { background: rgba(255,255,255,0.1); }

        /* ВЕЛИКИЙ ЦЕНТРОВАНИЙ КАЛЕНДАР */
        .modal-cal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 700px; height: 500px; background: #2d2d2d; border-radius: 8px;
            border: 1px solid #444; box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: none; flex-direction: column; z-index: 2000;
        }
        .win-head { background: #3d3d3d; padding: 10px 15px; display: flex; justify-content: space-between; border-radius: 8px 8px 0 0; }
        .close { width: 12px; height: 12px; background: var(--u-orange); border-radius: 50%; cursor: pointer; }

        /* МЕНЮ ПРИ КЛІКУ */
        .dropdown { position: absolute; top: 30px; right: 10px; width: 180px; background: #2d2d2d; border: 1px solid #444; display: none; flex-direction: column; border-radius: 6px; }
        .item { padding: 10px; cursor: pointer; font-size: 14px; }
        .item:hover { background: var(--u-orange); }
    </style>
</head>
<body>

<div class="top-bar">
    <div>Мій софт</div>
    <div class="clock" id="timer" onclick="toggleCal()">Срд 25 Бер, 22:15</div>
    <div class="menu-btn" onclick="toggleMenu()">МЕНЮ</div>
</div>

<div class="launcher">
    <div class="icon" title="Блокнот">📑</div>
    <div class="icon" title="Росток">🌱</div>
    <div class="icon" title="Парасолька">☂️</div>
    <div class="icon" title="Групи">👥</div>
    <div class="icon" title="Додати">👤</div>
    <div style="margin-top: auto; margin-bottom: 20px;">
        <div class="icon">⚙️</div>
        <div class="icon">:::</div>
    </div>
</div>

<div class="main-logo">
    <div class="diamond">💎</div>
    <div class="logo-text">мій софт</div>
</div>

<div id="calendar" class="modal-cal">
    <div class="win-head"><span>Календар</span><div class="close" onclick="toggleCal()"></div></div>
    <div style="padding: 40px; text-align: center; font-size: 20px;">Велика сітка календаря Березень 2026</div>
</div>

<div id="menu" class="dropdown">
    <div class="item">Налаштування акаунту</div>
    <div class="item">Налаштування</div>
    <div class="item" style="border-top: 1px solid #444;">Вихід</div>
</div>

<script>
    function toggleCal() {
        let c = document.getElementById('calendar');
        c.style.display = (c.style.display === 'flex') ? 'none' : 'flex';
    }
    function toggleMenu() {
        let m = document.getElementById('menu');
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }
    // Оновлення часу (приклад)
    setInterval(() => {
        const d = new Date();
        document.getElementById('timer').innerText = d.toLocaleString('uk-UA', {weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
    }, 1000);
</script>

</body>
</html>
