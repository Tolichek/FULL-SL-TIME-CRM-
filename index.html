<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HumanTree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #3b82f6; --border: #2a2a2a; }
        body { background: var(--bg); color: #e0e0e0; font-family: sans-serif; padding-top: env(safe-area-inset-top); }
        
        /* Зв'язки рівнів */
        .level-0 { border-left: 2px solid #3b82f6; }
        .level-1 { border-left: 2px solid #10b981; }
        .level-2 { border-left: 2px solid #ef4444; }
        .level-3 { border-left: 2px solid #f59e0b; }

        .node-container { margin-left: 12px; padding-left: 14px; position: relative; }
        .node-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #1a1a1a; }
        
        .full-page { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; }
        .input-group { background: var(--card); border-radius: 12px; overflow: hidden; margin-bottom: 12px; border: 1px solid var(--border); }
        .field { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
        .field:last-child { border-bottom: none; }
        .field label { width: 100px; font-size: 13px; color: #888; }
        .field input { background: transparent; border: none; outline: none; color: #fff; flex: 1; font-size: 16px; }
        
        /* Компактний календар */
        input[type="date"] { color-scheme: dark; font-size: 14px; max-width: 150px; }
        
        /* Авто-висота для тексту */
        textarea { background: transparent; border: none; outline: none; color: #fff; flex: 1; font-size: 16px; resize: none; overflow: hidden; min-height: 24px; }
    </style>
</head>
<body>

    <div id="main-screen" class="p-4">
        <div class="flex justify-end mb-6">
            <button onclick="addNewNode(null)" class="text-blue-500 text-4xl">+</button>
        </div>
        <div id="tree-root"></div>
    </div>

    <div id="editor" class="full-page overflow-y-auto">
        <div class="flex justify-between items-center px-4 py-4 border-b border-[#2a2a2a] sticky top-0 bg-[#121212] z-10">
            <button onclick="closeEditor()" class="text-blue-500">Скасувати</button>
            <button onclick="saveNode()" class="text-blue-500 font-bold text-lg">Готово</button>
        </div>

        <div class="p-4">
            <div class="flex flex-col items-center mb-6">
                <input type="file" id="photo-input" hidden accept="image/*" onchange="previewPhoto(this)">
                <div id="photo-preview" onclick="document.getElementById('photo-input').click()" class="w-20 h-20 bg-[#252525] rounded-full flex items-center justify-center border border-[#333] overflow-hidden">
                    <span class="text-[10px] text-zinc-600">ФОТО</span>
                </div>
            </div>

            <div class="input-group">
                <div class="field"><label>Статус</label><input id="edit-status" type="text" class="text-blue-400"></div>
                <div class="field"><label>Прізвище</label><input id="edit-surname" type="text"></div>
                <div class="field"><label>Ім'я</label><input id="edit-name" type="text"></div>
            </div>

            <div class="input-group" id="phone-container"></div>
            <button onclick="addPhoneField('')" class="text-blue-500 text-sm mb-6 ml-2">+ Додати мобільний</button>

            <div class="input-group">
                <div class="field"><label>E-mail</label><input id="edit-email" type="email"></div>
                <div class="field"><label>Народився</label><input id="edit-bday" type="date"></div>
            </div>

            <div id="note-section" class="input-group hidden">
                <div class="field">
                    <textarea id="edit-note" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'" placeholder="Примітка..."></textarea>
                </div>
            </div>
            <button id="add-note-btn" onclick="showNoteField()" class="text-blue-500 text-sm ml-2">+ Додати примітку</button>
        </div>
    </div>

    <script>
        let treeData = JSON.parse(localStorage.getItem('treeData')) || [];
        let currentId = null;
        let currentPhoto = '';

        const colors = ['level-0', 'level-1', 'level-2', 'level-3'];

        function render() {
            const root = document.getElementById('tree-root');
            root.innerHTML = '';
            buildTree(null, root, 0);
        }

        function buildTree(parentId, container, level) {
            const children = treeData.filter(n => n.parentId === parentId);
            children.forEach(node => {
                const wrap = document.createElement('div');
                wrap.className = parentId ? `node-container ${colors[level % 4]}` : '';
                container.appendChild(wrap);
                const row = document.createElement('div');
                row.className = 'node-row';
                row.innerHTML = `
                    <div class="flex-1" onclick="openNode('${node.id}')">
                        <div class="text-[10px] text-blue-400 uppercase tracking-tight">${node.status || ''}</div>
                        <div class="font-medium text-lg">${node.surname || ''} ${node.name || '...'}</div>
                    </div>
                    <button onclick="addNewNode('${node.id}')" class="text-zinc-700 px-4 text-2xl">+</button>
                `;
                wrap.appendChild(row);
                buildTree(node.id, wrap, level + 1);
            });
        }

        function previewPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('photo-preview').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                    currentPhoto = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function addNewNode(parentId) {
            const id = 'id' + Date.now();
            treeData.push({ id, parentId, name:'', surname:'', status:'', phones:[], email:'', bday:'', note:'', photo:'' });
            openNode(id);
        }

        function openNode(id) {
            currentId = id;
            const node = treeData.find(n => n.id === id);
            document.getElementById('edit-status').value = node.status || '';
            document.getElementById('edit-surname').value = node.surname || '';
            document.getElementById('edit-name').value = node.name || '';
            document.getElementById('edit-email').value = node.email || '';
            document.getElementById('edit-bday').value = node.bday || '';
            document.getElementById('edit-note').value = node.note || '';
            currentPhoto = node.photo || '';
            
            document.getElementById('photo-preview').innerHTML = currentPhoto ? `<img src="${currentPhoto}" class="w-full h-full object-cover">` : `<span class="text-[10px] text-zinc-600">ФОТО</span>`;
            
            const pCont = document.getElementById('phone-container');
            pCont.innerHTML = '';
            (node.phones || []).filter(p => p.trim() !== '').forEach(p => addPhoneField(p));
            
            if (node.note) showNoteField(); else hideNoteField();
            document.getElementById('editor').style.display = 'flex';
        }

        function addPhoneField(val) {
            const div = document.createElement('div');
            div.className = 'field';
            div.innerHTML = `<label>Мобільний</label><input type="tel" value="${val}" placeholder="+380...">`;
            document.getElementById('phone-container').appendChild(div);
        }

        function showNoteField() {
            document.getElementById('note-section').classList.remove('hidden');
            document.getElementById('add-note-btn').classList.add('hidden');
        }

        function hideNoteField() {
            document.getElementById('note-section').classList.add('hidden');
            document.getElementById('add-note-btn').classList.remove('hidden');
        }

        function saveNode() {
            const node = treeData.find(n => n.id === currentId);
            node.status = document.getElementById('edit-status').value;
            node.surname = document.getElementById('edit-surname').value;
            node.name = document.getElementById('edit-name').value;
            node.email = document.getElementById('edit-email').value;
            node.bday = document.getElementById('edit-bday').value;
            node.note = document.getElementById('edit-note').value;
            node.photo = currentPhoto;
            node.phones = Array.from(document.querySelectorAll('#phone-container input')).map(i => i.value).filter(v => v !== '');
            
            localStorage.setItem('treeData', JSON.stringify(treeData));
            document.getElementById('editor').style.display = 'none';
            render();
        }

        function closeEditor() { document.getElementById('editor').style.display = 'none'; }
        render();
    </script>
</body>
</html>
