<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій софт - CRM</title>
    <style>
        :root {
            --u-orange: #e95420;
            --u-bg: #1a0512;
            --u-grey: #2d2d2d;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            /* Твої шпалери з графіті */
            background: url('wall_logo.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Ubuntu', sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* TOP BAR */
        .top-bar {
            height: 28px; background: rgba(0, 0, 0, 0.8);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; font-size: 13px; z-index: 1000;
        }
        .clock { position: absolute; left: 50%; transform: translateX(-50%); font-weight: bold; cursor: pointer; }
        .menu-txt { cursor: pointer; font-weight: bold; }

        /* DOCK (SIDEBAR) */
        .dock {
            position: fixed; left: 0; top: 28px; bottom: 0; width: 58px;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center; padding-top: 10px;
            z-index: 900;
        }
        .l-icon {
            width: 42px; height: 42px; margin-bottom: 12px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 24px;
            border-radius: 6px; transition: 0.2s; color: rgba(255,255,255,0.7);
        }
        .l-icon:hover { background: rgba(255,255,255,0.1); color: white; }
        .l-icon.active { border-left: 3px solid var(--u-orange); background: rgba(255,255,255,0.1); border-radius: 0 6px 6px 0; color: white; }

        /* WINDOWS */
        .win {
            position: absolute; background: rgba(45, 45, 45, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            display: none; flex-direction: column; z-index: 800;
        }
        .win.open { display: flex; }
        .win-head { height: 35px; background: #3d3d3d; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-radius: 8px 8px 0 0; }
        .win-controls { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .close { background: var(--u-orange); }
        .max { background: #3ac43a; }

        /* MAXIMIZED STATE */
        .win.maximized {
            top: 28px !important; left: 58px !important;
            width: calc(100% - 58px) !important;
            height: calc(100% - 28px) !important;
            border-radius: 0;
        }

        /* ТАБЛИЦЯ СПИСКУ */
        .client-list { padding: 20px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; border-bottom: 2px solid #444; padding: 10px; color: var(--u-orange); }
        td { padding: 10px; border-bottom: 1px solid #333; }

    </style>
</head>
<body>

    <div class="top-bar">
        <div>Мій софт</div>
        <div class="clock" onclick="toggleWin('cal-win')">Срд 15 Трв, 10:30</div>
        <div class="menu-txt" onclick="toggleMenu()">МЕНЮ</div>
    </div>

    <div class="dock">
        <div class="l-icon" id="btn-list" onclick="toggleWin('list-win')">📑</div>
        <div class="l-icon">🌱</div>
        <div class="l-icon">☂️</div>
        <div class="l-icon">👥</div>
        <div class="l-icon">👤</div>
        <div style="margin-top: auto; margin-bottom: 20px;">
            <div class="l-icon">⚙️</div>
            <div class="l-icon">:::</div>
        </div>
    </div>

    <div id="list-win" class="win" style="top: 50px; left: 100px; width: 800px; height: 500px;">
        <div class="win-head">
            <span id="win-title">Список клієнтів</span>
            <div class="win-controls">
                <div class="dot max" onclick="maximize('list-win')"></div>
                <div class="dot close" onclick="toggleWin('list-win')"></div>
            </div>
        </div>
        <div class="client-list">
            <table>
                <thead>
                    <tr><th>ПІБ</th><th>Статус</th><th>Дата</th><th>Телефон</th></tr>
                </thead>
                <tbody>
                    <tr><td>Іванов Іван</td><td>Новий</td><td>15.05.2026</td><td>+380...</td></tr>
                    <tr><td>Петренко Петро</td><td>В роботі</td><td>14.05.2026</td><td>+380...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function toggleWin(id) {
            let win = document.getElementById(id);
            let isOpen = win.style.display === 'flex';
            win.style.display = isOpen ? 'none' : 'flex';
            if(id === 'list-win') document.getElementById('btn-list').classList.toggle('active', !isOpen);
        }

        function maximize(id) {
            document.getElementById(id).classList.toggle('maximized');
        }
    </script>
</body>
</html>
