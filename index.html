<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/180/ffffff/star.png">
    <title>SL CRM 4.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --main-bg: #0f0f12;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
            --text: #ffffff;
        }

        body.theme-gold { --accent: #ffcc00; --main-bg: #1a1608; }
        body.theme-purple { --accent: #d000ff; --main-bg: #12081a; }
        body.theme-green { --accent: #00ff88; --main-bg: #081a12; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--main-bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Splash */
        #splash { position: fixed; inset: 0; background: var(--main-bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-logo { width: 100px; height: 100px; border: 4px solid var(--accent); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 800; box-shadow: 0 0 30px var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }

        /* Layout */
        header { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--glass-border); }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar-circle { width: 40px; height: 40px; border-radius: 12px; background-size: cover; border: 1.5px solid var(--accent); box-shadow: 0 0 10px var(--accent); }
        .header-title { font-weight: 800; font-size: 20px; letter-spacing: -1px; text-transform: uppercase; }
        
        #viewport { display: flex; width: 100vw; height: calc(100vh - 130px); overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .page { flex: 0 0 100vw; height: 100%; overflow-y: auto; padding: 20px; scroll-snap-align: start; }

        /* Kanban & Cards */
        .column-label { font-size: 12px; font-weight: 800; text-transform: uppercase; color: var(--accent); margin-bottom: 15px; display: flex; justify-content: space-between; opacity: 0.8; }
        .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; padding: 16px; margin-bottom: 12px; position: relative; backdrop-filter: blur(10px); }
        .card h3 { font-size: 16px; margin-bottom: 4px; }
        .card p { font-size: 13px; opacity: 0.5; }
        .card-lvl { position: absolute; top: 16px; right: 16px; font-size: 20px; font-weight: 800; color: var(--accent); }

        /* Nav */
        nav { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 60px; background: rgba(20,20,25,0.8); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-around; z-index: 1000; }
        .nav-link { font-size: 10px; font-weight: 800; text-transform: uppercase; opacity: 0.4; transition: 0.3s; }
        .nav-link.active { opacity: 1; color: var(--accent); }

        /* UI Elements */
        .btn-plus { width: 50px; height: 50px; background: var(--accent); color: #000; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; position: fixed; bottom: 100px; right: 20px; z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .modal { position: fixed; inset: 0; background: var(--main-bg); z-index: 20000; display: none; flex-direction: column; padding: 30px; overflow-y: auto; }
        input, select, textarea { width: 100%; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; padding: 15px; color: #fff; margin-bottom: 15px; outline: none; }
        label { font-size: 10px; font-weight: 800; margin-bottom: 6px; display: block; opacity: 0.5; }
        .btn-save { background: var(--accent); color: #000; padding: 18px; border-radius: 15px; font-weight: 800; text-align: center; border: none; cursor: pointer; }

        .theme-sel { display: flex; gap: 10px; margin-top: 20px; }
        .t-dot { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #fff; }
    </style>
</head>
<body>

<div id="splash">
    <div class="loader-logo">SL</div>
    <div id="login-box" style="display:none; margin-top:30px;">
        <button onclick="login()" style="padding:15px 30px; border-radius:12px; border:none; font-weight:800;">GOOGLE LOGIN</button>
    </div>
</div>

<header>
    <div class="user-info" onclick="showSettings()">
        <div id="u-avatar" class="avatar-circle"></div>
        <div class="header-title">SL CRM</div>
    </div>
    <div id="count-total" style="font-size:12px; font-weight:800; background:var(--glass); padding:5px 12px; border-radius:10px;">0</div>
</header>

<div id="viewport">
    <div id="p-lists" class="page"></div>
    <div id="p-struct" class="page"><div id="struct-grid" class="struct-grid"></div></div>
    <div id="p-plan" class="page" style="display:flex; align-items:center; justify-content:center; opacity:0.2;">COMING SOON</div>
</div>

<div class="btn-plus" onclick="createCard()">+</div>

<nav>
    <div class="nav-link active" onclick="jump(0)">Списки</div>
    <div class="nav-link" onclick="jump(1)">Структура</div>
    <div class="nav-link" onclick="jump(2)">План</div>
</nav>

<div id="m-edit" class="modal">
    <h2 id="m-title" style="margin-bottom:20px;">КАРТКА</h2>
    <label>ЕТАП</label><select id="f-step"></select>
    <label>ПРІЗВИЩЕ</label><input type="text" id="f-lname">
    <label>ІМ'Я</label><input type="text" id="f-fname">
    <label>ТЕЛЕФОН</label><input type="tel" id="f-phone">
    <label>РІВЕНЬ</label><select id="f-level"><option value="">None</option><script>for(let i=1;i<=16;i++)document.write(`<option value="${i}">${i}</option>`)</script></select>
    <label>ПРИМІТКИ</label><textarea id="f-notes" rows="3"></textarea>
    <div style="display:flex; gap:10px;">
        <button class="btn-save" style="flex:1" onclick="saveCard()">ЗБЕРЕГТИ</button>
        <button onclick="closeModal()" style="background:var(--glass); color:#fff; border-radius:15px; padding:0 20px; border:none;">X</button>
    </div>
    <div onclick="deleteCard()" style="color:red; text-align:center; margin-top:30px; font-weight:800; font-size:12px;">ВИДАЛИТИ</div>
</div>

<div id="m-set" class="modal">
    <h2>НАЛАШТУВАННЯ</h2>
    <div class="theme-sel">
        <div class="t-dot" style="background:#00f2ff" onclick="setTheme('cyan')"></div>
        <div class="t-dot" style="background:#ffcc00" onclick="setTheme('gold')"></div>
        <div class="t-dot" style="background:#d000ff" onclick="setTheme('purple')"></div>
        <div class="t-dot" style="background:#00ff88" onclick="setTheme('green')"></div>
    </div>
    <button class="btn-save" style="margin-top:auto" onclick="closeModal()">ЗАКРИТИ</button>
    <div onclick="auth.signOut().then(()=>location.reload())" style="text-align:center; margin-top:20px; opacity:0.5;">Вийти з акаунту</div>
</div>

<script>
    const fb = { apiKey: "AIzaSyBLi2NoAigr1CDQm98iZHUZXNeDzJMwwxY", authDomain: "starlife-crm.firebaseapp.com", projectId: "starlife-crm", storageBucket: "starlife-crm.firebasestorage.app", messagingSenderId: "1022280682130", appId: "1:1022280682130:web:3ea517e8b6d22c7787744b" };
    firebase.initializeApp(fb);
    const auth = firebase.auth(), db = firebase.firestore();
    let user = null, clients = [], editId = null;
    const steps = ["Список", "Бесіда", "Розробка", "Презентація", "Ліфт", "Поліс", "Семінар", "Партнер"];

    auth.onAuthStateChanged(u => {
        if(u) { user = u; loadData(); document.getElementById('splash').style.display='none'; }
        else { document.getElementById('login-box').style.display='block'; }
    });

    function loadData() {
        db.collection("users").doc(user.uid).collection("clients").onSnapshot(s => {
            clients = []; s.forEach(d => clients.push({id:d.id, ...d.data()}));
            render();
        });
        document.getElementById('u-avatar').style.backgroundImage = `url(${user.photoURL})`;
    }

    function render() {
        const area = document.getElementById('p-lists'); area.innerHTML = '';
        document.getElementById('count-total').innerText = clients.length;
        const sel = document.getElementById('f-step'); sel.innerHTML = '';

        steps.forEach((st, i) => {
            sel.innerHTML += `<option value="${i}">${st}</option>`;
            const mine = clients.filter(c => (c.step || 0) == i);
            let html = `<div class="column-label"><span>${st}</span><span>${mine.length}</span></div>`;
            mine.forEach(c => {
                html += `<div class="card" onclick="openEdit('${c.id}')">
                    <div class="card-lvl">${c.level || ''}</div>
                    <h3>${c.lname || 'Без'} ${c.fname || 'імені'}</h3>
                    <p>${c.phone || 'Немає телефону'}</p>
                </div>`;
            });
            area.innerHTML += `<div style="margin-bottom:40px;">${html}</div>`;
        });
    }

    function jump(i) {
        document.getElementById('viewport').scrollTo({left: i * window.innerWidth, behavior: 'smooth'});
        document.querySelectorAll('.nav-link').forEach((l, idx) => l.classList.toggle('active', i === idx));
    }

    function openEdit(id) {
        editId = id; const c = clients.find(x => x.id === id);
        ['lname','fname','phone','notes','level'].forEach(f => document.getElementById('f-'+f).value = c[f] || '');
        document.getElementById('f-step').value = c.step || 0;
        document.getElementById('m-edit').style.display = 'flex';
    }

    async function saveCard() {
        const d = {
            lname: document.getElementById('f-lname').value,
            fname: document.getElementById('f-fname').value,
            phone: document.getElementById('f-phone').value,
            notes: document.getElementById('f-notes').value,
            level: document.getElementById('f-level').value,
            step: parseInt(document.getElementById('f-step').value),
            updated: Date.now()
        };
        await db.collection("users").doc(user.uid).collection("clients").doc(editId).set(d, {merge:true});
        closeModal();
    }

    async function createCard() {
        const res = await db.collection("users").doc(user.uid).collection("clients").add({step:0, created:Date.now()});
        openEdit(res.id);
    }

    async function deleteCard() { if(confirm('Видалити?')) { await db.collection("users").doc(user.uid).collection("clients").doc(editId).delete(); closeModal(); } }
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); editId = null; }
    function showSettings() { document.getElementById('m-set').style.display='flex'; }
    function setTheme(t) { document.body.className = 'theme-'+t; localStorage.setItem('crm_theme', t); }
    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

    const savedTheme = localStorage.getItem('crm_theme');
    if(savedTheme) setTheme(savedTheme);
</script>
</body>
</html>
