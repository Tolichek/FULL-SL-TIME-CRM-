<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HumanTree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding-top: env(safe-area-inset-top); }
        .node-line { border-left: 1px solid #333; margin-left: 15px; padding-left: 10px; }
        .full-screen-editor { position: fixed; inset: 0; background: #000; z-index: 100; display: none; padding: 20px; padding-top: 60px; }
    </style>
</head>
<body>

    <div id="app" class="p-4">
        <h1 class="text-zinc-500 text-xs uppercase mb-4 tracking-widest">Твоя картотека</h1>
        <div id="tree-container"></div>
        <button onclick="addNewNode(null)" class="mt-4 text-blue-500 text-sm">+ Додати першу гілку</button>
    </div>

    <div id="editor" class="full-screen-editor overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <button onclick="closeEditor()" class="text-zinc-400">Скасувати</button>
            <button onclick="saveNode()" class="bg-blue-600 px-6 py-2 rounded-lg font-bold">Зберегти</button>
        </div>

        <div class="space-y-6">
            <div class="flex flex-col items-center">
                <div class="w-24 h-24 bg-zinc-900 rounded-2xl mb-4 border border-zinc-800 flex items-center justify-center text-zinc-700">ФОТО</div>
                <input id="edit-name" type="text" placeholder="Прізвище та Ім'я" class="bg-transparent text-2xl text-center w-full outline-none font-bold">
                <input id="edit-status" type="text" placeholder="Статус" class="bg-transparent text-blue-500 text-center w-full outline-none text-sm mt-2">
            </div>

            <div id="edit-phones" class="space-y-3">
                <label class="text-xs text-zinc-500 uppercase">Телефони</label>
                </div>
            <button onclick="addPhoneField('')" class="text-blue-500 text-sm">+ Додати номер</button>

            <div class="flex flex-col">
                <label class="text-xs text-zinc-500 uppercase mb-2">Примітка</label>
                <textarea id="edit-note" class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 min-h-[150px] outline-none"></textarea>
            </div>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('treeData')) || [];
        let currentNodeId = null;

        function renderTree(nodes, container, parentId = null) {
            container.innerHTML = '';
            nodes.filter(n => n.parentId === parentId).forEach(node => {
                const div = document.createElement('div');
                div.className = 'mb-2';
                div.innerHTML = `
                    <div class="flex items-center gap-3 py-2 border-b border-zinc-900">
                        <span onclick="openNode('${node.id}')" class="flex-1 cursor-pointer">
                            <span class="font-bold">${node.name || 'Без імені'}</span>
                            <span class="text-blue-500 text-xs ml-2">${node.status || ''}</span>
                        </span>
                        <button onclick="addNewNode('${node.id}')" class="text-zinc-600 text-xl w-8 h-8">+</button>
                    </div>
                    <div id="child-${node.id}" class="node-line"></div>
                `;
                container.appendChild(div);
                renderTree(nodes, div.querySelector(`#child-${node.id}`), node.id);
            });
        }

        function addNewNode(parentId) {
            const id = Date.now().toString();
            data.push({ id, parentId, name: '', status: '', phones: [''], note: '' });
            openNode(id);
        }

        function openNode(id) {
            currentNodeId = id;
            const node = data.find(n => n.id === id);
            document.getElementById('edit-name').value = node.name;
            document.getElementById('edit-status').value = node.status;
            document.getElementById('edit-note').value = node.note;
            document.getElementById('edit-phones').innerHTML = '<label class="text-xs text-zinc-500 uppercase">Телефони</label>';
            node.phones.forEach(p => addPhoneField(p));
            document.getElementById('editor').style.display = 'block';
        }

        function addPhoneField(value) {
            const div = document.createElement('div');
            div.className = 'flex gap-2';
            div.innerHTML = `<input type="tel" value="${value}" class="bg-zinc-900 p-3 rounded-lg flex-1 outline-none" placeholder="+380...">`;
            document.getElementById('edit-phones').appendChild(div);
        }

        function saveNode() {
            const node = data.find(n => n.id === currentNodeId);
            node.name = document.getElementById('edit-name').value;
            node.status = document.getElementById('edit-status').value;
            node.note = document.getElementById('edit-note').value;
            node.phones = Array.from(document.querySelectorAll('#edit-phones input')).map(i => i.value);
            
            localStorage.setItem('treeData', JSON.stringify(data));
            closeEditor();
            renderTree(data, document.getElementById('tree-container'));
        }

        function closeEditor() {
            document.getElementById('editor').style.display = 'none';
        }

        renderTree(data, document.getElementById('tree-container'));
    </script>
</body>
</html>
