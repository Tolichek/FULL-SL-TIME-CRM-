<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій софт - Робочий стіл</title>
    <style>
        :root {
            --u-orange: #e95420;
            --u-dark: #1a0512;
            --u-win-bg: #2d2d2d;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            /* Шпалери зі стіною та градієнтом */
            background: radial-gradient(circle at center, #4b1a30 0%, #1a0512 100%);
            font-family: 'Ubuntu', sans-serif; color: white; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* ЛОГОТИП ГРАФІТІ ПО ЦЕНТРУ */
        .desktop-bg {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; pointer-events: none; z-index: 1;
        }
        .logo-graffiti {
            font-size: 100px; color: var(--u-orange); font-weight: bold;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.5);
        }
        .diamond { font-size: 80px; display: block; margin-bottom: -20px; }

        /* ВЕРХНЯ ПАНЕЛЬ */
        .top-bar {
            height: 28px; background: rgba(0, 0, 0, 0.8);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; font-size: 13px; z-index: 1000;
        }
        .clock-trigger { cursor: pointer; font-weight: bold; position: absolute; left: 50%; transform: translateX(-50%); }
        .menu-trigger { cursor: pointer; font-weight: bold; }

        /* ЛАУНЧЕР */
        .launcher {
            position: fixed; left: 0; top: 28px; bottom: 0; width: 55px;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center; padding-top: 10px; z-index: 900;
        }
        .l-icon {
            width: 40px; height: 40px; margin-bottom: 12px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 22px;
            border-radius: 6px; transition: 0.2s;
        }
        .l-icon:hover { background: rgba(255,255,255,0.1); }

        /* ВЕЛИКИЙ ЦЕНТРОВАНИЙ КАЛЕНДАР */
        .cal-win {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 700px; height: 550px; background: var(--u-win-bg);
            border-radius: 8px; border: 1px solid #444; box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            display: none; flex-direction: column; z-index: 2000;
        }
        .win-head {
            height: 35px; background: #3d3d3d; display: flex; 
            justify-content: space-between; align-items: center; padding: 0 15px;
            border-radius: 8px 8px 0 0;
        }
        .close-btn { width: 12px; height: 12px; background: var(--u-orange); border-radius: 50%; cursor: pointer; }

        /* МЕНЮ */
        .drop-menu {
            position: absolute; top: 30px; right: 10px; width: 200px;
            background: #2d2d2d; border: 1px solid #444; border-radius: 6px;
            display: none; flex-direction: column; z-index: 1001;
        }
        .menu-item { padding: 10px 15px; cursor: pointer; font-size: 14px; }
        .menu-item:hover { background: var(--u-orange); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>Мій софт</div>
        <div class="clock-trigger" onclick="toggleCal()">Срд 25 Бер, 22:15</div>
        <div class="menu-trigger" onclick="toggleMenu()">МЕНЮ</div>
    </div>

    <div class="launcher">
        <div class="l-icon" onclick="openNotes()">📑</div>
        <div class="l-icon">🌱</div>
        <div class="l-icon">☂️</div>
        <div class="l-icon">👥</div>
        <div class="l-icon">👤</div>
        <div style="margin-top: auto; margin-bottom: 20px;">
            <div class="l-icon">⚙️</div>
            <div class="l-icon">:::</div>
        </div>
    </div>

    <div class="desktop-bg">
        <span class="diamond">💎</span>
        <div class="logo-graffiti">мій софт</div>
    </div>

    <div id="calendar" class="cal-win">
        <div class="win-head">
            <span>Березень 2026</span>
            <div class="close-btn" onclick="toggleCal()"></div>
        </div>
        <div style="padding: 40px; font-size: 24px; text-align: center;">
            Тут велика сітка календаря...
        </div>
    </div>

    <div id="menu" class="drop-menu">
        <div class="menu-item">Налаштування акаунту</div>
        <div class="menu-item">Налаштування</div>
        <div style="height: 1px; background: #444;"></div>
        <div class="menu-item">Вихід</div>
    </div>

    <script>
        function toggleCal() {
            let c = document.getElementById('calendar');
            c.style.display = (c.style.display === 'flex') ? 'none' : 'flex';
        }
        function toggleMenu() {
            let m = document.getElementById('menu');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }
        // Закриття при кліку поза меню
        window.onclick = function(event) {
            if (!event.target.matches('.menu-trigger')) {
                document.getElementById('menu').style.display = 'none';
            }
        }
    </script>
</body>
</html>
