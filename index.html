<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HumanTree Full</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --border: #2a2a2a; --accent: #10b981; --blue: #3b82f6; }
        body { background: var(--bg); color: #e0e0e0; font-family: sans-serif; margin: 0; padding: env(safe-area-inset-top) 0 0 0; overflow: hidden; height: 100vh; }
        .level-0 { border-left: 2px solid var(--blue); margin-bottom: 6px; }
        .level-1 { border-left: 2px solid var(--accent); margin-left: 12px; }
        .level-2 { border-left: 2px solid #ef4444; margin-left: 12px; }
        .level-3 { border-left: 2px solid #f59e0b; margin-left: 12px; }
        .node-row { display: flex; align-items: center; padding: 10px 0 10px 12px; border-bottom: 1px solid #1a1a1a; background: rgba(255,255,255,0.02); }
        .full-page { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .editor-header { position: sticky; top: 0; background: #121212; z-index: 110; display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .input-group { background: var(--card); border-radius: 8px; overflow: hidden; margin-bottom: 16px; border: 1px solid var(--border); }
        .field { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
        .field label { font-size: 11px; color: var(--accent); width: 85px; text-transform: uppercase; flex-shrink: 0; font-weight: bold; }
        .field input, .field select { background: transparent; border: none; outline: none; color: #fff; flex: 1; font-size: 16px; width: 100%; }
        #edit-status { color: var(--accent) !important; font-weight: bold; text-transform: uppercase; }
        .pass-tag { color: var(--accent); font-size: 10px; text-transform: uppercase; font-weight: bold; margin-right: 4px; }
        textarea { resize: none; overflow: hidden; min-height: 24px; display: block; width: 100%; background: transparent; border: none; outline: none; color: #fff; white-space: pre-wrap; }
        .btn-plus { color: var(--blue); font-size: 14px; padding: 10px 16px; display: block; margin-bottom: 12px; text-align: left; }
        .age-badge { font-size: 12px; color: var(--accent) !important; margin-left: auto; font-weight: bold; }
        .photo-wrap { position: relative; width: 100px; height: 100px; margin: 20px auto; }
        .btn-del-main { position: absolute; right: -70px; top: 0; color: #ef4444; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        #confirm-dialog { position: fixed; background: #252525; border-radius: 12px; display: none; z-index: 500; border: 1px solid #444; box-shadow: 0 10px 40px rgba(0,0,0,1); width: auto; }
        .dialog-btn { padding: 12px 20px; font-size: 14px; text-align: center; color: #fff; cursor: pointer; flex: 1; white-space: nowrap; }
        .dialog-btn:first-child { border-right: 1px solid #333; }
        #history-screen { display: none; flex-direction: column; height: 100%; position: fixed; inset: 0; z-index: 200; background: var(--bg); user-select: none; -webkit-user-select: none; }
        #history-content { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .chat-date { text-align: center; font-size: 10px; color: var(--accent); margin: 15px 0 5px; text-transform: uppercase; font-weight: bold; }
        .chat-bubble { background: #2b2b2b; padding: 10px 14px; border-radius: 15px 15px 15px 2px; margin-bottom: 8px; max-width: 85%; align-self: flex-start; white-space: pre-wrap; position: relative; }
        .chat-time { font-size: 9px; color: var(--accent); float: right; margin-top: 5px; margin-left: 10px; font-weight: bold; }
        .history-footer { padding: 10px; background: #1e1e1e; border-top: 1px solid #333; display: flex; align-items: flex-end; gap: 10px; }
        #history-input { background: #121212; border: 1px solid #333; border-radius: 8px; padding: 10px; color: #fff; flex: 1; min-height: 40px; max-height: 150px; font-size: 16px; user-select: text; -webkit-user-select: text; }
        #context-menu { position: fixed; background: #252525; border-radius: 12px; display: none; z-index: 500; border: 1px solid #444; width: auto; }
        .menu-item { padding: 16px 24px; font-size: 15px; text-align: center; border-bottom: 1px solid #333; color: #fff; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="main-screen" class="p-2 h-full overflow-y-auto">
        <div class="flex justify-between items-center px-2 mb-4">
            <span class="text-[#10b981] font-bold text-xs uppercase">Список / Структура</span>
            <button onclick="addNewNode(null)" class="text-blue-500 text-4xl">+</button>
        </div>
        <div id="tree-root"></div>
    </div>

    <div id="editor" class="full-page overflow-y-auto">
        <div class="editor-header">
            <button onclick="closeEditor()" class="text-blue-500 text-sm">Скасувати</button>
            <button onclick="saveNode()" class="text-blue-500 font-bold text-lg">Готово</button>
        </div>
        <div class="p-4 pb-32">
            <div class="photo-wrap">
                <input type="file" id="photo-input" hidden accept="image/*" onchange="previewPhoto(this)">
                <div onclick="document.getElementById('photo-input').click()" class="w-24 h-24 bg-[#252525] rounded-full flex items-center justify-center border border-[#333] overflow-hidden">
                    <img id="edit-photo-preview" src="" class="w-full h-full object-cover" style="display:none">
                    <span id="photo-placeholder" class="text-[10px] text-zinc-600">ФОТО</span>
                </div>
                <button onclick="deleteNode()" class="btn-del-main">Видалити</button>
            </div>
            <div class="input-group">
                <div class="field"><label>Статус</label><input id="edit-status" type="text"></div>
                <div class="field"><label>Прізвище</label><input id="edit-surname" type="text"></div>
                <div class="field"><label>Ім'я</label><input id="edit-name" type="text"></div>
                <div id="patr-main-cont"></div>
            </div>
            <button id="btn-patr-main" onclick="addPatrField('main')" class="btn-plus">+ Додати по-батькові</button>
            <div id="phone-container"></div>
            <button onclick="addPhoneField('')" class="btn-plus">+ Додати мобільний</button>
            <div class="input-group"><div class="field"><label>Дата нар.</label><input id="edit-bday" type="date" onchange="updateAge(this, 'age-display')"><span id="age-display" class="age-badge"></span></div></div>
            <div class="input-group">
                <div class="field"><label>Паспорт</label><span class="pass-tag">серія</span><input id="edit-pass-ser" style="width:40px; flex:none;"><span class="pass-tag">№</span><input id="edit-pass-num" style="flex:1;"></div>
                <div class="field"><label>ІНН</label><input id="edit-inn" type="text"></div>
            </div>
            <div class="input-group">
                <div class="field"><label>Область</label><input id="edit-region" type="text"></div>
                <div class="field"><label>Нас. пункт</label><input id="edit-city" type="text"></div>
                <div class="field"><label>Вулиця</label><input id="edit-street" type="text"></div>
                <div class="field"><label>Будинок</label><input id="edit-house" type="text"></div>
                <div id="extra-addr-cont"></div>
            </div>
            <div class="flex gap-2">
                <button id="btn-corp" onclick="addExtraAddr('corp')" class="btn-plus">+ Корпус</button>
                <button id="btn-apt" onclick="addExtraAddr('apt')" class="btn-plus">+ Квартира</button>
                <button id="btn-zip" onclick="addExtraAddr('zip')" class="btn-plus">+ Індекс</button>
            </div>
            <button onclick="openHistory()" class="w-full py-4 bg-zinc-800 rounded-lg text-white font-bold mt-4 uppercase">Історія</button>
            <button onclick="openInsurance(0)" class="w-full py-4 bg-zinc-800 rounded-lg text-white font-medium mt-4 uppercase">Поліс</button>
        </div>
    </div>

    <div id="ins-editor" class="full-page overflow-y-auto">
        <div class="editor-header"><button onclick="closeInsurance()" class="text-blue-500 text-sm">Назад</button><div class="text-white font-bold">Поліс</div><div class="w-10"></div></div>
        <div class="p-4 pb-32" id="ins-fields-root"></div>
    </div>

    <div id="history-screen">
        <div class="flex justify-between items-center px-4 py-3 border-b border-[#2a2a2a] bg-[#121212]"><button onclick="closeHistory()" class="text-blue-500">Назад</button><span class="font-bold">Історія дій</span><div class="w-10"></div></div>
        <div id="history-content"></div>
        <div class="history-footer"><textarea id="history-input" oninput="autoH(this)"></textarea><button onclick="addHistoryMsg()" class="text-blue-500 text-3xl">➤</button></div>
    </div>

    <div id="confirm-dialog"><div class="p-6 text-center text-sm border-b border-[#333]">Видалити?</div><div class="flex"><div class="dialog-btn text-zinc-400" onclick="closeModal()">Назад</div><div id="confirm-ok-btn" class="dialog-btn text-red-500 font-bold">ОК</div></div></div>
    <div id="context-menu"><div class="menu-item" onclick="startEditMsg()">Редагувати</div><div class="menu-item text-red-500" onclick="showDelDialog()">Видалити</div></div>

    <script>
        let treeData = JSON.parse(localStorage.getItem('treeData')) || [];
        let currentId = null, currentPhotoBase64 = '', activeInsIdx = 0, selectedMsgIdx = null;

        function render() {
            const root = document.getElementById('tree-root'); root.innerHTML = '';
            treeData.filter(n => !n.parentId).forEach(node => buildTree(node, root, 0));
        }

        function buildTree(node, container, level) {
            const wrap = document.createElement('div'); wrap.className = `level-${level % 4}`;
            container.appendChild(wrap);
            wrap.innerHTML = `<div class="node-row"><div class="flex-1" onclick="openNode('${node.id}')"><div class="text-[10px] text-[#10b981] font-bold mb-1 uppercase">${node.status || ''}</div><div class="text-lg font-light">${node.surname || ''} ${node.name || '...'}</div></div><button onclick="addNewNode('${node.id}')" class="text-blue-500 text-2xl px-4">+</button></div>`;
            treeData.filter(n => n.parentId === node.id).forEach(child => buildTree(child, wrap, level + 1));
        }

        function openNode(id) {
            currentId = id; const n = treeData.find(x => x.id === id);
            document.getElementById('edit-status').value = n.status || '';
            document.getElementById('edit-surname').value = n.surname || '';
            document.getElementById('edit-name').value = n.name || '';
            currentPhotoBase64 = n.photo || '';
            const img = document.getElementById('edit-photo-preview');
            if(currentPhotoBase64) { img.src = currentPhotoBase64; img.style.display = 'block'; document.getElementById('photo-placeholder').style.display = 'none'; }
            else { img.style.display = 'none'; document.getElementById('photo-placeholder').style.display = 'block'; }
            document.getElementById('patr-main-cont').innerHTML = '';
            if(n.patronymic) addPatrField('main', n.patronymic); else document.getElementById('btn-patr-main').style.display = 'block';
            document.getElementById('edit-bday').value = n.bday || '';
            updateAge({value: n.bday}, 'age-display');
            document.getElementById('edit-pass-ser').value = n.pass_ser || '';
            document.getElementById('edit-pass-num').value = n.pass_num || '';
            document.getElementById('edit-inn').value = n.inn || '';
            document.getElementById('edit-region').value = n.region || '';
            document.getElementById('edit-city').value = n.city || '';
            document.getElementById('edit-street').value = n.street || '';
            document.getElementById('edit-house').value = n.house || '';
            document.getElementById('extra-addr-cont').innerHTML = '';
            ['corp', 'apt', 'zip'].forEach(t => { if(n[t]) addExtraAddr(t, n[t]); else if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).style.display = 'block'; });
            document.getElementById('phone-container').innerHTML = ''; (n.phones || []).forEach(p => addPhoneField(p));
            document.getElementById('editor').style.display = 'flex';
        }

        function saveNode() {
            const n = treeData.find(x => x.id === currentId);
            if(n) {
                n.status = document.getElementById('edit-status').value;
                n.surname = document.getElementById('edit-surname').value;
                n.name = document.getElementById('edit-name').value;
                n.photo = currentPhotoBase64;
                n.patronymic = document.getElementById('inp-main-patr')?.value || n.patronymic || '';
                n.bday = document.getElementById('edit-bday').value;
                n.pass_ser = document.getElementById('edit-pass-ser').value;
                n.pass_num = document.getElementById('edit-pass-num').value;
                n.inn = document.getElementById('edit-inn').value;
                n.region = document.getElementById('edit-region').value;
                n.city = document.getElementById('edit-city').value;
                n.street = document.getElementById('edit-street').value;
                n.house = document.getElementById('edit-house').value;
                n.corp = document.getElementById('edit-corp')?.value || n.corp || '';
                n.apt = document.getElementById('edit-apt')?.value || n.apt || '';
                n.zip = document.getElementById('edit-zip')?.value || n.zip || '';
                n.phones = Array.from(document.querySelectorAll('.phone-data')).map(i => i.value);
                localStorage.setItem('treeData', JSON.stringify(treeData));
                closeEditor(); render();
            }
        }

        function openInsurance(idx) {
            activeInsIdx = idx; const n = treeData.find(x => x.id === currentId); if(!n.insurances) n.insurances = [{}];
            const ins = n.insurances[idx];
            document.getElementById('ins-fields-root').innerHTML = `
                <div class="input-group">
                    <div class="field"><label>Дата нар.</label><input id="ins-bday" type="date" value="${ins.bday||''}" onchange="updateAge(this, 'ia')"><span id="ia" class="age-badge">${calculateAge(ins.bday)}</span></div>
                    <div class="field"><label>Строк</label><select id="ins-term">
                        <option value="на 10 років" ${ins.term==='на 10 років'?'selected':''}>на 10 років</option>
                        <option value="на 15 років" ${ins.term==='на 15 років'?'selected':''}>на 15 років</option>
                        <option value="на 20 років" ${ins.term==='на 20 років'?'selected':''}>на 20 років</option>
                        <option value="до 65 років" ${ins.term==='до 65 років'?'selected':''}>до 65 років</option>
                    </select></div>
                </div>
                <div class="input-group">
                    <div class="field"><label>Сума полісу</label><input id="ins-tot" value="${ins.total||''}"></div>
                    <div class="field"><label>№ Накоп.</label><input id="ins-nn" value="${ins.n_nakop||''}"></div>
                    <div class="field"><label>Сума Накоп.</label><input id="ins-sn" value="${ins.s_nakop||''}"></div>
                    <div class="field"><label>№ Захисту</label><input id="ins-nz" value="${ins.n_zahyst||''}"></div>
                    <div class="field"><label>Сума Захисту</label><input id="ins-sz" value="${ins.s_zahyst||''}"></div>
                </div>
                <div class="input-group">
                    <div class="field"><label>Роль</label><select id="ins-role"><option value="Батько">Батько</option><option value="Мати">Мати</option></select></div>
                    <div class="field"><label>Прізвище</label><input id="ins-psur" value="${ins.p_sur||''}"></div>
                    <div class="field"><label>Ім'я</label><input id="ins-pnam" value="${ins.p_nam||''}"></div>
                    <div class="field"><label>Дата нар.</label><input id="ins-pbday" type="date" value="${ins.p_bday||''}" onchange="updateAge(this, 'ipa')"><span id="ipa" class="age-badge">${calculateAge(ins.p_bday)}</span></div>
                </div>
                <div id="ins-notes-cont"></div>
                <button onclick="addInsNote('')" class="btn-plus">+ Додати примітку</button>`;
            (ins.notes || []).forEach(nt => addInsNote(nt));
            document.getElementById('ins-editor').style.display = 'flex';
        }

        function closeInsurance() {
            const n = treeData.find(x => x.id === currentId), ins = n.insurances[activeInsIdx];
            ins.bday = document.getElementById('ins-bday').value; ins.term = document.getElementById('ins-term').value;
            ins.total = document.getElementById('ins-tot').value; ins.n_nakop = document.getElementById('ins-nn').value;
            ins.s_nakop = document.getElementById('ins-sn').value; ins.n_zahyst = document.getElementById('ins-nz').value;
            ins.s_zahyst = document.getElementById('ins-sz').value; ins.role = document.getElementById('ins-role').value;
            ins.p_sur = document.getElementById('ins-psur').value; ins.p_nam = document.getElementById('ins-pnam').value;
            ins.p_bday = document.getElementById('ins-pbday').value;
            ins.notes = Array.from(document.querySelectorAll('.ins-note-data')).map(t => t.value);
            document.getElementById('ins-editor').style.display = 'none';
        }

        function renderHistory() {
            const cont = document.getElementById('history-content'); cont.innerHTML = '';
            const n = treeData.find(x => x.id === currentId);
            (n.history || []).forEach((msg, idx) => {
                const b = document.createElement('div'); b.className = "chat-bubble";
                b.innerHTML = `${msg.text} <span class="chat-time">${new Date(msg.time).toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'})}</span>`;
                cont.appendChild(b);
            });
            cont.scrollTop = cont.scrollHeight;
        }

        function addHistoryMsg() { const input = document.getElementById('history-input'); if(!input.value.trim()) return; const n = treeData.find(x => x.id === currentId); n.history.push({text:input.value, time:new Date().toISOString()}); input.value=''; renderHistory(); }
        function previewPhoto(input) { if (input.files && input.files[0]) { const reader = new FileReader(); reader.onload = e => { currentPhotoBase64 = e.target.result; document.getElementById('edit-photo-preview').src = currentPhotoBase64; document.getElementById('edit-photo-preview').style.display = 'block'; document.getElementById('photo-placeholder').style.display = 'none'; }; reader.readAsDataURL(input.files[0]); } }
        function addNewNode(parentId) { const id = 'id' + Date.now(); treeData.push({ id, parentId: parentId || null, surname: '', name: '', status: '', phones: [], photo: '', history: [], insurances: [{}] }); localStorage.setItem('treeData', JSON.stringify(treeData)); render(); openNode(id); }
        function closeEditor() { document.getElementById('editor').style.display = 'none'; }
        function openHistory() { document.getElementById('history-screen').style.display = 'flex'; renderHistory(); }
        function closeHistory() { document.getElementById('history-screen').style.display = 'none'; }
        function addPatrField(t, v='') { document.getElementById('patr-main-cont').innerHTML = `<div class="field"><label>По-батькові</label><input id="inp-main-patr" type="text" value="${v}"></div>`; document.getElementById('btn-patr-main').style.display = 'none'; }
        function addExtraAddr(t, v='') { const div = document.createElement('div'); div.className = 'field'; const labels = {corp:'Корпус', apt:'Квартира', zip:'Індекс'}; div.innerHTML = `<label>${labels[t]}</label><input id="edit-${t}" type="text" value="${v}">`; document.getElementById('extra-addr-cont').appendChild(div); if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).style.display = 'none'; }
        function addPhoneField(v) { const div = document.createElement('div'); div.className = 'input-group'; div.innerHTML = `<div class="field"><label>моб.</label><input type="tel" class="phone-data" value="${v}"></div>`; document.getElementById('phone-container').appendChild(div); }
        function addInsNote(v) { const div = document.createElement('div'); div.className = 'input-group'; div.innerHTML = `<div class="field"><textarea class="ins-note-data" oninput="autoH(this)">${v}</textarea></div>`; document.getElementById('ins-notes-cont').appendChild(div); }
        function calculateAge(d) { if(!d) return ''; const b = new Date(d), t = new Date(); let a = t.getFullYear()-b.getFullYear(); if(t.getMonth()<b.getMonth() || (t.getMonth()===b.getMonth() && t.getDate()<b.getDate())) a--; return a + ' р.'; }
        function updateAge(el, id) { document.getElementById(id).innerText = calculateAge(el.value); }
        function autoH(el) { el.style.height = '40px'; if(el.scrollHeight > 40) el.style.height = el.scrollHeight + 'px'; }
        function deleteNode() { if(confirm('Видалити?')) { treeData = treeData.filter(n => n.id !== currentId); localStorage.setItem('treeData', JSON.stringify(treeData)); closeEditor(); render(); } }
        render();
    </script>
</body>
</html>
