<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>SL CRM RESTORED</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #1a0826; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .card h3 { margin: 0 0 5px 0; }
        .card p { margin: 0; opacity: 0.6; font-size: 14px; }
        .step-title { font-size: 12px; text-transform: uppercase; color: #d000ff; margin: 20px 0 10px; border-bottom: 1px solid rgba(208,0,255,0.3); padding-bottom: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>SL Time CRM</h2>
        <div id="total">0</div>
    </div>
    <div id="board"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBLi2NoAigr1CDQm98iZHUZXNeDzJMwwxY", authDomain: "starlife-crm.firebaseapp.com", projectId: "starlife-crm", storageBucket: "starlife-crm.firebasestorage.app", messagingSenderId: "1022280682130", appId: "1:1022280682130:web:3ea517e8b6d22c7787744b" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(), auth = firebase.auth();
        const steps = ["Список", "Бесіда", "Розробка", "Презентація", "Ліфт", "Поліс", "Семінар", "Партнер"];

        auth.onAuthStateChanged(user => {
            if(user) {
                db.collection("users").doc(user.uid).collection("clients").onSnapshot(snap => {
                    const clients = [];
                    snap.forEach(doc => clients.push({id: doc.id, ...doc.data()}));
                    document.getElementById('total').innerText = clients.length;
                    render(clients);
                });
            } else {
                auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
            }
        });

        function render(clients) {
            const board = document.getElementById('board');
            board.innerHTML = '';
            steps.forEach((stepName, stepIdx) => {
                const filtered = clients.filter(c => (c.step || 0) == stepIdx);
                if(filtered.length > 0 || stepIdx === 0) {
                    const section = document.createElement('div');
                    section.innerHTML = `<div class="step-title">${stepName} (${filtered.length})</div>`;
                    filtered.forEach(c => {
                        section.innerHTML += `
                            <div class="card">
                                <h3>${c.lname || ''} ${c.fname || 'Без імені'}</h3>
                                <p>${c.phone || 'Немає номеру'}</p>
                            </div>`;
                    });
                    board.appendChild(section);
                }
            });
        }
    </script>
</body>
</html>
