<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій софт - Desktop</title>
    <style>
        :root {
            --u-orange: #e95420;
            --u-bg: #1a0512;
            --u-grey: #2d2d2d;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            /* ШПАЛЕРИ: Ми використовуємо саме твоє графіті на стіні */
            background: 
                url('image_0.png') no-repeat center center fixed; /* Шпалери графіті */
            background-size: cover;
            font-family: 'Ubuntu', 'Noto Sans UI', sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- ВЕРХНЯ ПАНЕЛЬ --- */
        .top-bar {
            height: 28px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            font-size: 13px;
            z-index: 1000;
        }

        .top-left { display: flex; align-items: center; }

        /* CLOCK (WORKING) */
        .clock {
            cursor: pointer;
            font-weight: bold;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .top-right {
            cursor: pointer;
            font-weight: bold;
            padding: 0 10px;
        }
        .top-right:hover { background: rgba(255,255,255,0.1); }

        /* --- ДОК (SIDEBAR) --- */
        .dock {
            position: fixed;
            left: 0; top: 28px; bottom: 0;
            width: 58px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 900;
        }

        .l-icon {
            width: 42px; height: 42px;
            margin-bottom: 12px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            color: rgba(255, 255, 255, 0.7);
            font-size: 24px;
        }

        .l-icon:hover { background: rgba(255, 255, 255, 0.1); color: white; }
        .l-icon.active { border-left: 3px solid var(--u-orange); background: rgba(255,255,255,0.1); border-radius: 0 6px 6px 0; color: white;}

        .dock-bottom { margin-top: auto; padding-bottom: 15px; }

        /* --- DESKTOP AREA --- */
        .desktop {
            position: relative;
            flex-grow: 1;
            margin-left: 58px; /* Відступ під док */
        }

        /* --- WINDOWS --- */
        .win {
            position: absolute;
            background: rgba(45, 45, 45, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            display: none; /* Приховане за замовчуванням */
            flex-direction: column;
            overflow: hidden;
            z-index: 800;
        }

        .win.open { display: flex; animation: winOpen 0.3s ease-out; }

        @keyframes winOpen { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .win-head {
            height: 35px; background: #3d3d3d;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; cursor: move; border-bottom: 1px solid rgba(0,0,0,0.2);
        }
        
        .win-title { font-size: 14px; font-weight: bold; }
        .win-controls { display: flex; gap: 8px; }
        .close-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--u-orange); cursor: pointer; }

        /* ВЕЛИКИЙ ЦЕНТРОВАНИЙ КАЛЕНДАР */
        .win-cal-pop {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); /* ЦЕНТР */
            width: 700px; height: 550px;
            background: var(--u-grey);
            z-index: 1050;
        }
        
        /* ПРОСТИЙ БЛОКНОТ (ПРИКЛАД ВІКНА, ЯКЕ РОЗГОРТАЄТЬСЯ) */
        #note-win {
            top: 50px; left: 50px; width: 600px; height: 400px;
        }
        #note-win.maximized { top: 30px !important; left: 60px !important; width: calc(100% - 70px) !important; height: calc(100% - 40px) !important; border-radius: 0; }
        #note-win textarea { flex-grow: 1; background: transparent; border: none; color: white; padding: 15px; font-family: monospace; font-size: 14px; outline: none; resize: none; }

        /* --- DROPDOWN MENU --- */
        .menu-pop {
            position: absolute; top: 32px; right: 10px; width: 220px;
            background: var(--u-grey); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: none; flex-direction: column; padding: 5px 0; z-index: 1001;
        }
        
        .menu-pop.open { display: flex; }
        .m-item { padding: 10px 15px; cursor: pointer; font-size: 14px; }
        .m-item:hover { background: rgba(255, 255, 255, 0.1); }
        .m-sep { height: 1px; background: rgba(255,255,255,0.1); margin: 5px 0; }

    </style>
</head>
<body>

    <div class="top-bar">
        <div class="top-left"><span>Мій софт</span></div>

        <div class="clock" onclick="toggleWindow('calendar-pop')">
            Срд 15 Трв, 10:30
        </div>

        <div class="top-right" id="menu-trigger" onclick="toggleMenu()">
            Меню
        </div>
    </div>

    <div class="dock">
        <div class="l-icon" id="btn-note" onclick="toggleWindow('note-win')">📑</div> <div class="l-icon">🌱</div> <div class="l-icon">☂️</div> <div class="l-icon">👥</div> <div class="l-icon">👤</div> <div class="dock-bottom">
            <div class="l-icon">⚙️</div> <div class="l-icon">:::</div> </div>
    </div>

    <div class="desktop">
        
        <div class="win win-cal-pop" id="calendar-pop">
            <div class="win-head">
                <span class="win-title">Травень 2026</span>
                <div class="win-controls"><div class="close-dot" onclick="toggleWindow('calendar-pop')"></div></div>
            </div>
            <div style="padding: 50px; text-align: center; font-size: 24px;">ВЕЛИКИЙ КАЛЕНДАР ПО ЦЕНТРУ</div>
        </div>

        <div class="win" id="note-win">
            <div class="win-head">
                <span class="win-title">Нотатки</span>
                <div class="win-controls">
                    <div class="dot" style="background: #3ac43a;" onclick="maximizeWin('note-win')"></div> <div class="close-dot" onclick="toggleWindow('note-win')"></div>
                </div>
            </div>
            <textarea placeholder="Почніть писати тут..."></textarea>
        </div>

        <div id="sys-menu" class="menu-pop">
            <div class="m-item">Налаштування акаунту</div>
            <div class="m-item">Налаштування</div>
            <div class="m-sep"></div>
            <div class="m-item" style="color: #ed333b;">Вихід</div>
        </div>

    </div>

<script>
    // --- УПРАВЛІННЯ ВІКНАМИ ---
    function toggleWindow(id) {
        let win = document.getElementById(id);
        
        // Спеціальний випадок для іконки блокнота (📑)
        if (id === 'note-win') {
            let btn = document.getElementById('btn-note');
            let isOpen = win.classList.contains('open');
            win.classList.toggle('open', !isOpen);
            btn.classList.toggle('active', !isOpen);
        } else {
            win.classList.toggle('open');
        }
    }

    // Максимізація вікна
    function maximizeWin(id) {
        document.getElementById(id).classList.toggle('maximized');
    }

    // --- УПРАВЛІННЯ МЕНЮ ---
    function toggleMenu() {
        let menu = document.getElementById('sys-menu');
        menu.classList.toggle('open');
    }

    // Закриття меню при кліку поза ним
    document.addEventListener('click', function(event) {
        let menu = document.getElementById('sys-menu');
        let menuTrigger = document.getElementById('menu-trigger');

        if (!menuTrigger.contains(event.target) && !menu.contains(event.target)) { menu.classList.remove('open'); }
    });

</script>
</body>
</html>
