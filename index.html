<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій софт - Документи</title>
    <style>
        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: #1a1a1a;
            font-family: 'Ubuntu', sans-serif;
            display: flex; justify-content: center; align-items: flex-start; 
            color: #ffffff; padding-top: 20px;
        }
        .window {
            width: 95%; max-width: 850px; background: #2d2d2d;
            border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-bar { display: flex; background: #333; }
        .nav-btn { flex: 1; padding: 15px; border: none; background: transparent; color: #aaa; font-size: 14px; cursor: pointer; }
        .nav-btn.active { background: #e95420; color: white; font-weight: bold; }
        
        .content { padding: 20px; min-height: 300px; }
        
        /* Рядок документа */
        .doc-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 0; border-bottom: 1px solid #444;
        }
        .doc-info { display: flex; align-items: center; gap: 15px; }
        .doc-icon { font-size: 24px; color: #e95420; opacity: 0.8; }
        .doc-details { display: flex; flex-direction: column; }
        .doc-name { color: #fff; font-size: 15px; cursor: pointer; }
        .doc-name:hover { text-decoration: underline; }
        .doc-meta { color: #888; font-size: 12px; margin-top: 2px; }

        .footer { padding: 15px; display: flex; justify-content: space-between; background: #252525; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 10px 20px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-ok { background: #e95420; color: white; }
        .btn-save { background: #444; color: white; }
        .btn-add { background: #3a5c3a; color: #d4edda; } /* Кнопка додавання */
        .btn-del { background: #7c1c1c; color: white; }
    </style>
</head>
<body>

<div class="window">
    <div class="nav-bar">
        <button class="nav-btn">Загальна</button>
        <button class="nav-btn">Поліс</button>
        <button class="nav-btn">Історія</button>
        <button class="nav-btn active">Документи</button>
    </div>

    <div class="content">
        <div class="doc-item">
            <div class="doc-info">
                <div class="doc-icon">📄</div>
                <div class="doc-details">
                    <span class="doc-name">Договір_страхування_Коваль.pdf</span>
                    <span class="doc-meta">25.03.2026 • 2.4 MB • PDF</span>
                </div>
            </div>
        </div>

        <div class="doc-item">
            <div class="doc-info">
                <div class="doc-icon">🖼️</div>
                <div class="doc-details">
                    <span class="doc-name">Фото_авто_перед_страхуванням.jpg</span>
                    <span class="doc-meta">24.03.2026 • 4.1 MB • JPG</span>
                </div>
            </div>
        </div>

        <div class="doc-item">
            <div class="doc-info">
                <div class="doc-icon">📝</div>
                <div class="doc-details">
                    <span class="doc-name">Замітка_до_полісу.txt</span>
                    <span class="doc-meta">20.03.2026 • 12 KB • TXT</span>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="btn-group">
            <button class="btn-ok">ОК</button>
            <button class="btn-save">Записати</button>
            <button class="btn-add">+ Додати файл</button>
        </div>
        <button class="btn-del">Видалити</button>
    </div>
</div>

</body>
</html>
