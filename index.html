<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HumanTree CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0f1115; --card: #161b22; --accent: #3081f7; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .tree-line { position: relative; padding-left: 20px; border-left: 1px solid #30363d; margin-left: 10px; }
        .input-flat { background: transparent; border: none; border-bottom: 1px solid #30363d; width: 100%; padding: 8px 0; outline: none; transition: 0.3s; }
        .input-flat:focus { border-bottom-color: var(--accent); }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 20px; }
        .btn-icon { width: 32px; height: 32px; display: flex; items-center; justify-content: center; border-radius: 8px; background: #21262d; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="h-14 border-b border-[#30363d] flex items-center px-4 justify-between bg-[#161b22]">
        <span class="font-bold tracking-tight text-white">HumanTree <span class="text-blue-500">v1.0</span></span>
        <div class="flex gap-2">
            <button onclick="saveData()" class="bg-blue-600 text-xs px-3 py-1 rounded-md text-white">Зберегти</button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <aside class="w-1/3 border-r border-[#30363d] overflow-y-auto p-2 bg-[#0d1117]">
            <div id="tree-root">
                <div class="text-xs uppercase text-zinc-500 mb-2 px-2">Картотека</div>
                <div class="py-1 px-2 bg-blue-900/20 text-blue-400 rounded cursor-pointer">👤 Анатолій (Я)</div>
                <div class="tree-line">
                    <div class="py-1 px-2 hover:bg-zinc-800 rounded cursor-pointer text-sm">👤 Новий контакт...</div>
                </div>
            </div>
            <button class="w-full mt-4 border border-dashed border-zinc-700 py-2 rounded text-xs text-zinc-500 hover:border-blue-500">+ Нова гілка</button>
        </aside>

        <section class="flex-1 overflow-y-auto p-4 md:p-8 bg-[#0f1115]">
            <div class="max-w-xl mx-auto space-y-6">
                
                <div class="flex items-center gap-6 mb-8">
                    <div class="relative group">
                        <div class="w-24 h-24 bg-zinc-800 rounded-3xl flex items-center justify-center border border-zinc-700 overflow-hidden">
                            <span class="text-[10px] text-zinc-500">PHOTO</span>
                        </div>
                        <button class="absolute -bottom-2 -right-2 btn-icon bg-blue-600 text-white shadow-lg">✎</button>
                    </div>
                    <div class="flex-1">
                        <input type="text" placeholder="ПІБ" class="text-2xl font-bold bg-transparent border-none outline-none w-full text-white" value="Надутий Анатолій">
                        <input type="text" placeholder="Статус (напр. VIP, Партнер...)" class="text-blue-400 bg-transparent border-none outline-none w-full text-sm">
                    </div>
                </div>

                <div class="card">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xs font-bold uppercase text-zinc-500">Контактні дані</h3>
                        <button onclick="addPhone()" class="text-blue-500 text-xs">+ Додати номер</button>
                    </div>
                    <div id="phones-container" class="space-y-3">
                        <div class="flex items-center gap-3">
                            <div class="btn-icon text-zinc-500">📞</div>
                            <input type="tel" placeholder="+380..." class="input-flat">
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h3 class="text-xs font-bold uppercase text-zinc-500 mb-2">Додаткова інформація</h3>
                    <textarea class="w-full bg-transparent border-none outline-none text-sm min-h-[100px] resize-none" placeholder="Історія зустрічей, важливі дати, нотатки..."></textarea>
                </div>

            </div>
        </section>
    </main>

    <script>
        function addPhone() {
            const container = document.getElementById('phones-container');
            const div = document.createElement('div');
            div.className = 'flex items-center gap-3 animate-slide-down';
            div.innerHTML = `
                <div class="btn-icon text-zinc-500">📞</div>
                <input type="tel" placeholder="+380..." class="input-flat">
                <button onclick="this.parentElement.remove()" class="text-zinc-600 hover:text-red-500">✕</button>
            `;
            container.appendChild(div);
        }

        function saveData() {
            alert('Дані збережено локально (імітація)');
            // Тут ми додамо логіку збереження в LocalStorage
        }
    </script>
</body>
</html>
