<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій софт - Робочий стіл</title>
    <style>
        /* ОСНОВНИЙ ФОН - Твоя текстура */
        body {
            margin: 0; padding: 0; height: 100vh;
            background: linear-gradient(135deg, #2d0922 0%, #4b1a30 50%, #c14e1a 100%);
            font-family: 'Ubuntu', sans-serif;
            color: white;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* ВЕРХНЯ ПАНЕЛЬ (Top Bar) */
        .top-bar {
            height: 28px;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            font-size: 13px;
            backdrop-filter: blur(5px);
            z-index: 1000;
        }

        /* ЛІВИЙ САЙДБАР (Ubuntu Launcher) */
        .launcher {
            position: fixed;
            left: 0; top: 28px; bottom: 0;
            width: 55px;
            background: rgba(0, 0, 0, 0.4);
            display: flex; flex-direction: column;
            align-items: center;
            padding-top: 10px;
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .launcher-icon {
            width: 38px; height: 38px;
            margin-bottom: 12px;
            border-radius: 6px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.05);
        }

        .launcher-icon:hover { background: rgba(255, 255, 255, 0.15); }
        .launcher-icon.active { border-left: 3px solid #e95420; border-radius: 0 6px 6px 0; }

        /* ОСНОВНА РОБОЧА ОБЛАСТЬ */
        .desktop {
            flex-grow: 1;
            margin-left: 55px;
            position: relative;
            padding: 20px;
        }

        /* ВІКНО ПРОГРАМИ (Яке ми робили) */
        .app-window {
            width: 800px;
            height: 500px;
            background: rgba(45, 45, 45, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px 8px 0 0;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            position: absolute;
            top: 50px; left: 50px;
            display: flex; flex-direction: column;
        }

        /* Заголовок вікна Ubuntu */
        .win-title-bar {
            height: 35px;
            background: #3d3d3d;
            border-radius: 8px 8px 0 0;
            display: flex; justify-content: space-between;
            align-items: center; padding: 0 12px;
            font-size: 13px; font-weight: bold;
        }

        .win-controls { display: flex; gap: 8px; }
        .win-dot { width: 12px; height: 12px; border-radius: 50%; background: #555; }
        .win-dot.close { background: #e95420; cursor: pointer; }

        /* ВНУТРІШНЯ НАВІГАЦІЯ (Вкладиші) */
        .win-nav {
            display: flex; background: #333;
        }
        .tab-btn {
            padding: 10px 20px; border: none; background: transparent;
            color: #aaa; cursor: pointer; font-family: 'Ubuntu'; font-size: 13px;
        }
        .tab-btn.active { background: #e95420; color: white; }

        /* КОНТЕНТ */
        .win-content { padding: 25px; flex-grow: 1; overflow-y: auto; }
        .info-row { display: flex; gap: 25px; margin-bottom: 12px; align-items: baseline; }
        .lbl { color: #999; font-size: 13px; width: 120px; }
        .val { color: #fff; font-size: 14px; }

        /* НИЖНЯ ПАНЕЛЬ ВІКНА */
        .win-footer {
            padding: 15px 20px; background: rgba(0,0,0,0.2);
            display: flex; justify-content: space-between;
        }
        .btn {
            padding: 7px 18px; border-radius: 4px; border: none;
            cursor: pointer; font-family: 'Ubuntu'; font-size: 13px;
        }
        .btn-orange { background: #e95420; color: white; }
        .btn-gray { background: #4a4a4a; color: white; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>Мій софт</div>
        <div>Срд 25 Бер, 21:54</div>
        <div>Меню</div>
    </div>

    <div class="launcher">
        <div class="launcher-icon">🏠</div>
        <div class="launcher-icon active">👥</div>
        <div class="launcher-icon">📅</div>
        <div class="launcher-icon">⚙️</div>
    </div>

    <div class="desktop">
        
        <div class="app-window">
            <div class="win-title-bar">
                <span>Картка клієнта (ms001) / Загальна</span>
                <div class="win-controls">
                    <div class="win-dot"></div>
                    <div class="win-dot"></div>
                    <div class="win-dot close"></div>
                </div>
            </div>

            <div class="win-nav">
                <button class="tab-btn active">Загальна</button>
                <button class="tab-btn">Поліс</button>
                <button class="tab-btn">Історія</button>
                <button class="tab-btn">Документи</button>
            </div>

            <div class="win-content">
                <div class="info-row">
                    <span class="lbl">ПІБ клієнта:</span>
                    <span class="val" style="font-size: 17px; font-weight: bold;">Олена Петрівна Коваль</span>
                </div>
                <div class="info-row">
                    <span class="lbl">Мобільний:</span>
                    <span class="val">+380 50 123 45 67</span>
                </div>
                <div class="info-row">
                    <span class="lbl">Додатковий:</span>
                    <span class="val">+380 67 987 65 43</span>
                </div>
                <div class="info-row">
                    <span class="lbl">Адреса:</span>
                    <span class="val" style="border-bottom: 1px dashed #e95420; cursor: pointer;">Житомир, вул. Лесі Українки, 10, кВ. 2</span>
                </div>
                <div class="info-row" style="margin-top: 15px;">
                    <span class="lbl">Дата народження:</span>
                    <span class="val">25.04.1998 (28 років)</span>
                </div>
                <div class="info-row">
                    <span class="lbl">Паспорт / ІНН:</span>
                    <span class="val">АБ 123456 / 2803225577</span>
                </div>
            </div>

            <div class="win-footer">
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-orange">Ок</button>
                    <button class="btn btn-gray">Записати</button>
                </div>
                <button class="btn" style="background: #7c1c1c; color: white;">Видалити</button>
            </div>
        </div>

    </div>

</body>
</html>
