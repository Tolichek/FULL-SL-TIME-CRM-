<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HumanTree CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --border: #2c2c2e; --accent: #0a84ff; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* Стиль дерева */
        .node-container { position: relative; padding-left: 24px; }
        .node-container::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 1px; background: var(--border); }
        .node-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
        
        /* Анкета (редактор) */
        .full-page { position: fixed; inset: 0; background: var(--bg); z-index: 50; display: none; flex-direction: column; }
        .input-group { background: var(--card); border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        .field { padding: 12px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; }
        .field:last-child { border-bottom: none; }
        .field label { width: 100px; font-size: 14px; color: #8e8e93; }
        .field input { background: transparent; border: none; outline: none; color: #fff; flex: 1; font-size: 16px; }
        
        .safe-top { padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body class="safe-top">

    <div id="main-screen" class="p-4">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Картотека</h1>
            <button onclick="addNewNode(null)" class="text-accent text-3xl">+</button>
        </div>
        <div id="tree-root"></div>
    </div>

    <div id="editor" class="full-page safe-top">
        <div class="flex justify-between items-center px-4 py-3 border-b border-[#2c2c2e]">
            <button onclick="closeEditor()" class="text-accent">Скасувати</button>
            <span class="font-semibold">Контакт</span>
            <button onclick="saveNode()" class="text-accent font-bold">Готово</button>
        </div>

        <div class="flex-1 overflow-y-auto p-4">
            <div class="flex flex-col items-center py-6">
                <div class="w-24 h-24 bg-zinc-800 rounded-full mb-3 flex items-center justify-center border border-zinc-700">
                    <span class="text-[10px] text-zinc-500">ФОТО</span>
                </div>
                <button class="text-accent text-xs">Додати фото</button>
            </div>

            <div class="input-group">
                <div class="field">
                    <label>Ім'я</label>
                    <input id="edit-name" type="text" placeholder="Прізвище та Ім'я">
                </div>
                <div class="field">
                    <label>Статус</label>
                    <input id="edit-status" type="text" placeholder="Власний статус" class="text-accent">
                </div>
            </div>

            <div class="input-group" id="phone-fields">
                </div>
            <button onclick="addPhone('')" class="text-accent text-sm px-4 mb-6">+ додати телефон</button>

            <div class="input-group">
                <div class="field py-0">
                    <textarea id="edit-note" class="bg-transparent w-full py-3 outline-none min-h-[120px]" placeholder="Примітка..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        let treeData = JSON.parse(localStorage.getItem('treeData')) || [];
        let currentId = null;

        function render() {
            const root = document.getElementById('tree-root');
            root.innerHTML = '';
            buildTree(null, root);
        }

        function buildTree(parentId, container) {
            const children = treeData.filter(n => n.parentId === parentId);
            if (children.length === 0) return;

            const wrap = document.createElement('div');
            wrap.className = parentId ? 'node-container' : '';
            container.appendChild(wrap);

            children.forEach(node => {
                const row = document.createElement('div');
                row.className = 'node-row';
                row.innerHTML = `
                    <div class="flex-1" onclick="openNode('${node.id}')">
                        <div class="font-medium">${node.name || 'Новий контакт'}</div>
                        <div class="text-xs text-accent">${node.status || ''}</div>
                    </div>
                    <button onclick="addNewNode('${node.id}')" class="text-zinc-600 px-4 text-2xl">+</button>
                `;
                wrap.appendChild(row);
                buildTree(node.id, wrap);
            });
        }

        function addNewNode(parentId) {
            const id = 'id' + Date.now();
            treeData.push({ id, parentId, name: '', status: '', phones: [''], note: '' });
            openNode(id);
        }

        function openNode(id) {
            currentId = id;
            const node = treeData.find(n => n.id === id);
            document.getElementById('edit-name').value = node.name;
            document.getElementById('edit-status').value = node.status;
            document.getElementById('edit-note').value = node.note;
            
            const pContainer = document.getElementById('phone-fields');
            pContainer.innerHTML = '';
            node.phones.forEach(p => addPhone(p));
            
            document.getElementById('editor').style.display = 'flex';
        }

        function addPhone(val) {
            const div = document.createElement('div');
            div.className = 'field';
            div.innerHTML = `<label>тел.</label><input type="tel" value="${val}" placeholder="+380...">`;
            document.getElementById('phone-fields').appendChild(div);
        }

        function saveNode() {
            const node = treeData.find(n => n.id === currentId);
            node.name = document.getElementById('edit-name').value;
            node.status = document.getElementById('edit-status').value;
            node.note = document.getElementById('edit-note').value;
            node.phones = Array.from(document.querySelectorAll('#phone-fields input')).map(i => i.value);
            
            localStorage.setItem('treeData', JSON.stringify(treeData));
            closeEditor();
            render();
        }

        function closeEditor() { document.getElementById('editor').style.display = 'none'; }

        render();
    </script>
</body>
</html>
