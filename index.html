<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    
    <link rel="manifest" href="data:application/manifest+json,{%22id%22:%22ht_v4%22,%22name%22:%22HumanTree%22,%22short_name%22:%22HumanTree%22,%22start_url%22:%22/%22,%22display%22:%22standalone%22,%22background_color%22:%22#121212%22,%22theme_color%22:%22#121212%22}">

    <title>HumanTree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --border: #2a2a2a; }
        body { background: var(--bg); color: #e0e0e0; font-family: sans-serif; margin: 0; padding: env(safe-area-inset-top) 0 0 0; overflow-x: hidden; height: 100vh; }
        
        .level-0 { border-left: 2px solid #3b82f6; }
        .level-1 { border-left: 2px solid #10b981; }
        .level-2 { border-left: 2px solid #ef4444; }
        .level-3 { border-left: 2px solid #f59e0b; }

        .node-container { margin-left: 10px; padding-left: 14px; }
        .node-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #1a1a1a; position: relative; }
        .node-row::before { content: ''; position: absolute; left: -14px; top: 50%; width: 10px; height: 1px; background: rgba(255,255,255,0.1); }
        
        .full-page { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .input-group { background: var(--card); border-radius: 8px; overflow: hidden; margin-bottom: 10px; border: 1px solid var(--border); }
        .field { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .field:last-child { border-bottom: none; }
        .field label { font-size: 11px; color: #555; width: 85px; text-transform: uppercase; flex-shrink: 0; }
        .field input, .field textarea, .field select { background: transparent; border: none; outline: none; color: #fff; flex: 1; font-size: 16px; width: 100%; }
        
        input[type="date"] { color-scheme: dark; font-size: 14px; width: 110px; }
        textarea { resize: none; overflow: hidden; min-height: 24px; display: block; width: 100%; }
        .btn-plus { color: #3b82f6; font-size: 13px; padding: 8px 16px; display: block; margin-bottom: 10px; text-align: left; }
        .age-badge { font-size: 12px; color: #888; margin-left: auto; }
    </style>
</head>
<body>

    <div id="main-screen" class="p-2 h-full overflow-y-auto">
        <div class="flex justify-end pr-2">
            <button onclick="addNewNode(null)" class="text-blue-500 text-4xl leading-none">+</button>
        </div>
        <div id="tree-root"></div>
    </div>

    <div id="editor" class="full-page overflow-y-auto">
        <div class="flex justify-between items-center px-4 py-3 border-b border-[#2a2a2a] sticky top-0 bg-[#121212] z-10">
            <button onclick="closeEditor()" class="text-blue-500 text-sm">Скасувати</button>
            <button onclick="saveNode()" class="text-blue-500 font-bold text-lg">Готово</button>
        </div>

        <div class="p-4 pb-32">
            <div class="flex items-center gap-6 mb-6">
                <input type="file" id="photo-input" hidden accept="image/*" onchange="previewPhoto(this)">
                <div id="photo-preview" onclick="document.getElementById('photo-input').click()" class="w-20 h-20 bg-[#252525] rounded-full flex items-center justify-center border border-[#333] overflow-hidden flex-shrink-0">
                    <span class="text-[10px] text-zinc-600">ФОТО</span>
                </div>
                <button onclick="deleteNode()" class="text-red-600 text-xs font-bold uppercase tracking-widest">Видалити</button>
            </div>

            <div class="input-group">
                <div class="field"><label>Статус</label><input id="edit-status" type="text" class="text-blue-400 font-bold"></div>
                <div class="field"><label>Прізвище</label><input id="edit-surname" type="text"></div>
                <div class="field"><label>Ім'я</label><input id="edit-name" type="text"></div>
                <div id="patronymic-field-main"></div>
            </div>
            <button id="btn-add-patr-main" onclick="addPatronymic('main')" class="btn-plus">+ Додати по-батькові</button>

            <div id="phone-container"></div>
            <button onclick="addPhoneField('')" class="btn-plus">+ Додати мобільний</button>

            <div id="email-container"></div>
            <button onclick="addEmailField('')" class="btn-plus">+ Додати EMAIL</button>

            <div class="input-group">
                <div class="field">
                    <label>Дата нар.</label>
                    <input id="edit-bday" type="date" onchange="updateAgeDisplay(this, 'age-display')">
                    <span id="age-display" class="age-badge"></span>
                </div>
            </div>

            <div id="note-container"></div>
            <button onclick="addNoteField('')" class="btn-plus">+ Додати примітку</button>

            <button onclick="openInsurance()" class="w-full py-4 bg-zinc-800 rounded-lg text-white font-medium mt-4">Застрахована особа</button>
        </div>
    </div>

    <div id="insurance-editor" class="full-page overflow-y-auto">
        <div class="flex justify-between items-center px-4 py-3 border-b border-[#2a2a2a] sticky top-0 bg-[#121212] z-10">
            <button onclick="closeInsurance()" class="text-blue-500 text-sm">Назад</button>
            <div class="text-white font-bold">Застрахована особа</div>
            <div class="w-10"></div>
        </div>

        <div class="p-4 pb-32">
            <div class="input-group">
                <div class="field"><label>Прізвище</label><textarea id="ins-surname" oninput="autoH(this)"></textarea></div>
                <div class="field"><label>Ім'я</label><textarea id="ins-name" oninput="autoH(this)"></textarea></div>
                <div id="patronymic-field-ins"></div>
            </div>
            <button id="btn-add-patr-ins" onclick="addPatronymic('ins')" class="btn-plus">+ Додати по-батькові</button>

            <div class="input-group">
                <div class="field">
                    <label>Дата нар.</label>
                    <input id="ins-bday" type="date" onchange="updateAgeDisplay(this, 'ins-age-display')">
                    <span id="ins-age-display" class="age-badge"></span>
                </div>
                <div class="field">
                    <label>Стать</label>
                    <select id="ins-gender">
                        <option value="не вказано">—</option>
                        <option value="жінка">жінка</option>
                        <option value="чоловік">чоловік</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <div class="field"><label>Зріст / см</label><input id="ins-height" type="number"></div>
                <div class="field"><label>Вага / кг</label><input id="ins-weight" type="number"></div>
            </div>

            <div class="input-group">
                <div class="field"><label>Сума полісу</label><input id="ins-total" type="text" placeholder="грн"></div>
                <div class="field"><label>№ Накоп.</label><input id="ins-num-nakop" type="text"></div>
                <div class="field"><label>Сума Накоп.</label><input id="ins-sum-nakop" type="text"></div>
                <div class="field"><label>№ Захисту</label><input id="ins-num-zahyst" type="text"></div>
                <div class="field"><label>Сума Захисту</label><input id="ins-sum-zahyst" type="text"></div>
            </div>

            <div id="ins-note-container"></div>
            <button onclick="addInsNoteField('')" class="btn-plus">+ Додати примітку</button>
        </div>
    </div>

    <script>
        let treeData = JSON.parse(localStorage.getItem('treeData')) || [];
        let currentId = null;
        let currentPhoto = '';
        const colors = ['level-0', 'level-1', 'level-2', 'level-3'];

        window.onpopstate = function() {
            if (document.getElementById('insurance-editor').style.display === 'flex') {
                closeInsurance();
            } else if (document.getElementById('editor').style.display === 'flex') {
                closeEditor();
            }
        };

        function render() {
            const root = document.getElementById('tree-root');
            root.innerHTML = '';
            buildTree(null, root, 0);
        }

        function buildTree(parentId, container, level) {
            const children = treeData.filter(n => n.parentId === parentId);
            children.forEach(node => {
                const wrap = document.createElement('div');
                wrap.className = parentId ? `node-container ${colors[level % 4]}` : '';
                container.appendChild(wrap);
                const row = document.createElement('div');
                row.className = 'node-row';
                const displayName = `${node.surname || ''} ${node.name || '...'}`.trim();
                row.innerHTML = `
                    <div class="flex-1" onclick="openNode('${node.id}')">
                        <div class="text-[9px] text-blue-400 uppercase font-bold leading-none mb-1">${node.status || ''}</div>
                        <div class="text-lg font-light tracking-tight">${displayName}</div>
                    </div>
                    <button onclick="addNewNode('${node.id}')" class="text-zinc-800 px-4 text-2xl font-light">+</button>
                `;
                wrap.appendChild(row);
                buildTree(node.id, wrap, level + 1);
            });
        }

        function calculateAge(bday) {
            if (!bday) return '';
            const birthDate = new Date(bday);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
            return age + ' р.';
        }

        function updateAgeDisplay(el, displayId) {
            document.getElementById(displayId).innerText = calculateAge(el.value);
        }

        function previewPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('photo-preview').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                    currentPhoto = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function addNewNode(parentId) {
            const id = 'id' + Date.now();
            treeData.push({ 
                id, parentId, name:'', surname:'', patronymic:'', status:'', phones:[], emails:[], bday:'', notes:[], photo:'',
                insurance: { surname:'', name:'', patronymic:'', bday:'', gender:'', height:'', weight:'', total:'', n_nakop:'', s_nakop:'', n_zahyst:'', s_zahyst:'', notes:[] }
            });
            openNode(id);
        }

        function openNode(id) {
            currentId = id;
            const node = treeData.find(n => n.id === id);
            history.pushState({page: 'editor'}, '');
            
            document.getElementById('edit-status').value = node.status || '';
            document.getElementById('edit-surname').value = node.surname || '';
            document.getElementById('edit-name').value = node.name || '';
            
            const patrMain = document.getElementById('patronymic-field-main');
            patrMain.innerHTML = '';
            document.getElementById('btn-add-patr-main').style.display = node.patronymic ? 'none' : 'block';
            if(node.patronymic) addPatronymic('main', node.patronymic);

            document.getElementById('edit-bday').value = node.bday || '';
            updateAgeDisplay({value: node.bday}, 'age-display');
            currentPhoto = node.photo || '';
            document.getElementById('photo-preview').innerHTML = currentPhoto ? `<img src="${currentPhoto}" class="w-full h-full object-cover">` : `<span class="text-[10px] text-zinc-600">ФОТО</span>`;
            
            document.getElementById('phone-container').innerHTML = '';
            (node.phones || []).forEach(p => addPhoneField(p));
            document.getElementById('email-container').innerHTML = '';
            (node.emails || []).forEach(e => addEmailField(e));
            document.getElementById('note-container').innerHTML = '';
            (node.notes || []).forEach(n => addNoteField(n));
            
            const ins = node.insurance || {};
            document.getElementById('ins-surname').value = ins.surname || '';
            document.getElementById('ins-name').value = ins.name || '';
            const patrIns = document.getElementById('patronymic-field-ins');
            patrIns.innerHTML = '';
            document.getElementById('btn-add-patr-ins').style.display = ins.patronymic ? 'none' : 'block';
            if(ins.patronymic) addPatronymic('ins', ins.patronymic);

            document.getElementById('ins-bday').value = ins.bday || '';
            document.getElementById('ins-gender').value = ins.gender || 'не вказано';
            document.getElementById('ins-height').value = ins.height || '';
            document.getElementById('ins-weight').value = ins.weight || '';
            document.getElementById('ins-total').value = ins.total || '';
            document.getElementById('ins-num-nakop').value = ins.n_nakop || '';
            document.getElementById('ins-sum-nakop').value = ins.s_nakop || '';
            document.getElementById('ins-num-zahyst').value = ins.n_zahyst || '';
            document.getElementById('ins-sum-zahyst').value = ins.s_zahyst || '';
            document.getElementById('ins-note-container').innerHTML = '';
            (ins.notes || []).forEach(n => addInsNoteField(n));
            updateAgeDisplay({value: ins.bday}, 'ins-age-display');

            setTimeout(() => {
                document.querySelectorAll('textarea').forEach(t => autoH(t));
            }, 50);

            document.getElementById('editor').style.display = 'flex';
        }

        function addPatronymic(type, val = '') {
            const container = document.getElementById(`patronymic-field-${type}`);
            container.innerHTML = `<div class="field"><label>По-батькові</label><input id="edit-patr-${type}" type="text" value="${val}"></div>`;
            document.getElementById(`btn-add-patr-${type}`).style.display = 'none';
        }

        function addPhoneField(val) {
            const div = document.createElement('div');
            div.className = 'input-group';
            div.innerHTML = `<div class="field"><label>моб.</label><input type="tel" class="phone-data" value="${val}"></div>`;
            document.getElementById('phone-container').appendChild(div);
        }

        function addEmailField(val) {
            const div = document.createElement('div');
            div.className = 'input-group';
            div.innerHTML = `<div class="field"><label>email</label><input type="email" class="email-data" value="${val}"></div>`;
            document.getElementById('email-container').appendChild(div);
        }

        function addNoteField(val) {
            const div = document.createElement('div');
            div.className = 'input-group';
            div.innerHTML = `<div class="field"><textarea class="note-data" oninput="autoH(this)">${val}</textarea></div>`;
            document.getElementById('note-container').appendChild(div);
            autoH(div.querySelector('textarea'));
        }

        function addInsNoteField(val) {
            const div = document.createElement('div');
            div.className = 'input-group';
            div.innerHTML = `<div class="field"><textarea class="ins-note-data" oninput="autoH(this)">${val}</textarea></div>`;
            document.getElementById('ins-note-container').appendChild(div);
            autoH(div.querySelector('textarea'));
        }

        function autoH(el) { 
            el.style.height = 'auto'; 
            el.style.height = el.scrollHeight + 'px'; 
        }

        function openInsurance() { 
            history.pushState({page: 'insurance'}, '');
            document.getElementById('insurance-editor').style.display = 'flex'; 
        }
        function closeInsurance() { 
            document.getElementById('insurance-editor').style.display = 'none'; 
        }

        function saveNode() {
            const index = treeData.findIndex(n => n.id === currentId);
            if (index === -1) return;

            treeData[index].status = document.getElementById('edit-status').value;
            treeData[index].surname = document.getElementById('edit-surname').value;
            treeData[index].name = document.getElementById('edit-name').value;
            const patrMainInput = document.getElementById('edit-patr-main');
            treeData[index].patronymic = patrMainInput ? patrMainInput.value : '';

            treeData[index].bday = document.getElementById('edit-bday').value;
            treeData[index].photo = currentPhoto;
            treeData[index].phones = Array.from(document.querySelectorAll('.phone-data')).map(i => i.value).filter(v => v.trim());
            treeData[index].emails = Array.from(document.querySelectorAll('.email-data')).map(i => i.value).filter(v => v.trim());
            treeData[index].notes = Array.from(document.querySelectorAll('.note-data')).map(t => t.value).filter(v => v.trim());
            
            const patrInsInput = document.getElementById('edit-patr-ins');
            treeData[index].insurance = {
                surname: document.getElementById('ins-surname').value,
                name: document.getElementById('ins-name').value,
                patronymic: patrInsInput ? patrInsInput.value : '',
                bday: document.getElementById('ins-bday').value,
                gender: document.getElementById('ins-gender').value,
                height: document.getElementById('ins-height').value,
                weight: document.getElementById('ins-weight').value,
                total: document.getElementById('ins-total').value,
                n_nakop: document.getElementById('ins-num-nakop').value,
                s_nakop: document.getElementById('ins-sum-nakop').value,
                n_zahyst: document.getElementById('ins-num-zahyst').value,
                s_zahyst: document.getElementById('ins-sum-zahyst').value,
                notes: Array.from(document.querySelectorAll('.ins-note-data')).map(t => t.value).filter(v => v.trim())
            };

            localStorage.setItem('treeData', JSON.stringify(treeData));
            closeEditor();
            render();
        }

        function deleteNode() {
            if(confirm('Видалити анкету?')) {
                const delRec = (id) => {
                    treeData.filter(n => n.parentId === id).forEach(c => delRec(c.id));
                    treeData = treeData.filter(n => n.id !== id);
                };
                delRec(currentId);
                localStorage.setItem('treeData', JSON.stringify(treeData));
                closeEditor();
                render();
            }
        }

        function closeEditor() { 
            document.getElementById('editor').style.display = 'none'; 
            document.getElementById('insurance-editor').style.display = 'none';
        }
        render();
    </script>
</body>
</html>
